<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JUANDY BUTIK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0e0e0e;
color:white;
}

/* HEADER */

.header{
display:flex;
align-items:center;
padding:10px;
background:black;
position:sticky;
top:0;
z-index:10;
}

.logo{
font-weight:bold;
margin-right:10px;
}

.search{
flex:1;
padding:8px;
border-radius:20px;
border:none;
}

.cartBtn{
background:#1ecb63;
border:none;
width:40px;
height:40px;
border-radius:50%;
margin-left:10px;
position:relative;
}

.cartCount{
position:absolute;
top:-5px;
right:-5px;
background:red;
border-radius:50%;
font-size:12px;
padding:2px 6px;
}

/* CATEGORY */

.cat{
display:flex;
overflow:auto;
gap:10px;
padding:10px;
}

.cat button{
background:#1b1b1b;
border:none;
color:white;
padding:8px 14px;
border-radius:20px;
}

/* BANNER */

.banner{
position:relative;
overflow:hidden;
margin:10px;
border-radius:10px;
}

.slides{
display:flex;
transition:0.4s;
}

.slides img{
width:100%;
flex-shrink:0;
height:180px;
object-fit:cover;
}

.dots{
text-align:center;
margin-top:5px;
}

.dot{
display:inline-block;
width:8px;
height:8px;
border-radius:50%;
background:#555;
margin:4px;
}

.activeDot{
background:#1ecb63;
}

/* PRODUCT */

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:#1b1b1b;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.info{
padding:10px;
}

.price{
color:#1ecb63;
font-weight:bold;
}

.rating{
color:gold;
font-size:13px;
}

.qty{
display:flex;
gap:10px;
margin-top:6px;
}

.qty button{
background:#1ecb63;
border:none;
width:28px;
height:28px;
border-radius:6px;
}

/* CART */

.cart{
position:fixed;
right:-100%;
top:0;
width:85%;
height:100%;
background:#111;
transition:0.4s;
padding:20px;
overflow:auto;
z-index:20;
}

.cart.open{
right:0;
}

.cartItem{
display:flex;
gap:10px;
margin-bottom:15px;
}

.cartItem img{
width:60px;
height:60px;
object-fit:cover;
border-radius:8px;
}

.total{
font-size:20px;
margin-top:20px;
}

.checkout{
background:#1ecb63;
padding:14px;
border:none;
width:100%;
border-radius:10px;
font-size:16px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">JUANDY BUTIK</div>

<input class="search" placeholder="Cari produk..." onkeyup="search(this.value)">

<button class="cartBtn" onclick="toggleCart()">
🛒
<span id="cartCount" class="cartCount">0</span>
</button>
</div>

<div class="cat">
<button onclick="filter('all')">Semua</button>
<button onclick="filter('baju')">Baju</button>
<button onclick="filter('tas')">Tas</button>
<button onclick="filter('sepatu')">Sepatu</button>
<button onclick="filter('jaket')">Jaket</button>
</div>

<!-- BANNER -->

<div class="banner">

<div class="slides" id="slides">

<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd53">
<img src="https://images.unsplash.com/photo-1520975922284-7b4f1c1c1a7c">

</div>

<div class="dots" id="dots"></div>

</div>

<!-- PRODUCT -->

<div class="products" id="products"></div>

<!-- CART -->

<div class="cart" id="cart">

<h2>Keranjang</h2>

<div id="cartItems"></div>

<div class="total" id="total"></div>

<button class="checkout" onclick="checkout()">Checkout</button>

</div>

<script>

/* DATA PRODUK */

let data=[

{id:1,nama:"Baju Fashion",harga:120000,kategori:"baju",rating:4.5,img:"https://images.unsplash.com/photo-1520975954732-35dd22299614"},

{id:2,nama:"Tas Wanita",harga:150000,kategori:"tas",rating:4.8,img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"},

{id:3,nama:"Sepatu Trend",harga:200000,kategori:"sepatu",rating:4.6,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},

{id:4,nama:"Jaket Pria",harga:250000,kategori:"jaket",rating:4.4,img:"https://images.unsplash.com/photo-1520975922284-7b4f1c1c1a7c"}

]

let cart=JSON.parse(localStorage.getItem("cart"))||{}

/* FORMAT RUPIAH */

function rupiah(x){
return "Rp "+x.toLocaleString()
}

/* LOAD PRODUK */

function loadProduk(list=data){

let html=""

list.forEach(p=>{

let qty=cart[p.id]||0

html+=`

<div class="card">

<img src="${p.img}">

<div class="info">

<b>${p.nama}</b>

<div class="price">${rupiah(p.harga)}</div>

<div class="rating">⭐ ${p.rating}</div>

<div class="qty">

<button onclick="minus(${p.id})">-</button>
<span>${qty}</span>
<button onclick="plus(${p.id})">+</button>

</div>

</div>

</div>

`

})

products.innerHTML=html

}

/* CART */

function plus(id){
cart[id]=(cart[id]||0)+1
save()
}

function minus(id){

if(cart[id]){

cart[id]--

if(cart[id]==0) delete cart[id]

save()

}

}

function removeItem(id){

delete cart[id]

save()

}

/* SAVE */

function save(){

localStorage.setItem("cart",JSON.stringify(cart))

loadProduk()

renderCart()

}

/* RENDER CART */

function renderCart(){

let html=""
let totalHarga=0
let count=0

for(let id in cart){

let p=data.find(x=>x.id==id)

let q=cart[id]

totalHarga+=p.harga*q
count+=q

html+=`

<div class="cartItem">

<img src="${p.img}">

<div>

<b>${p.nama}</b>

<br>

<button onclick="minus(${p.id})">-</button>
${q}
<button onclick="plus(${p.id})">+</button>

<br>

${rupiah(p.harga*q)}

<br>

<button onclick="removeItem(${p.id})">Hapus</button>

</div>

</div>

`

}

cartItems.innerHTML=html

total.innerHTML="Total : "+rupiah(totalHarga)

cartCount.innerText=count

}

/* CART */

function toggleCart(){
cart.classList.toggle("open")
}

/* CHECKOUT */

function checkout(){

let text="Pesanan:%0A"

for(let id in cart){

let p=data.find(x=>x.id==id)

text+=p.nama+" x"+cart[id]+"%0A"

}

window.open("https://wa.me/?text="+text)

}

/* SEARCH */

function search(v){

let f=data.filter(p=>p.nama.toLowerCase().includes(v.toLowerCase()))

loadProduk(f)

}

/* FILTER */

function filter(k){

if(k=="all") loadProduk()

else loadProduk(data.filter(p=>p.kategori==k))

}

/* BANNER */

let index=0
let slides=document.getElementById("slides")
let dots=document.getElementById("dots")
let totalSlide=slides.children.length

for(let i=0;i<totalSlide;i++){

dots.innerHTML+=`<span class="dot"></span>`

}

document.querySelectorAll(".dot")[0].classList.add("activeDot")

function showSlide(){

slides.style.transform=`translateX(-${index*100}%)`

let d=document.querySelectorAll(".dot")

d.forEach(x=>x.classList.remove("activeDot"))

d[index].classList.add("activeDot")

}

/* AUTO SLIDE */

setInterval(()=>{

index++

if(index>=totalSlide) index=0

showSlide()

},3000)

/* SWIPE TOUCH */

let startX=0

slides.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

slides.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50){

index++

if(index>=totalSlide) index=0

}

if(endX-startX>50){

index--

if(index<0) index=totalSlide-1

}

showSlide()

})

/* INIT */

loadProduk()
renderCart()

</script>

</body>
</html>
