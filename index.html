<!DOCTYPE html>
<html>
<head>
<title>JUANDY BUTIK</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.banner{
background:linear-gradient(45deg,#ff0077,#6600ff);
padding:40px;
text-align:center;
font-size:20px;
}

.search{
text-align:center;
padding:20px;
}

.search input{
width:80%;
padding:10px;
border-radius:5px;
border:none;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:10px;
}

.product{
background:#1b1b1b;
width:200px;
margin:10px;
padding:15px;
border-radius:10px;
text-align:center;
transition:0.3s;
}

.product:hover{
transform:scale(1.05);
}

.product img{
width:100%;
border-radius:10px;
}

.price{
color:#00ff99;
font-size:18px;
margin:10px 0;
}

button{
background:#00cc66;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
color:white;
}

button:hover{
background:#00ff99;
}

footer{
text-align:center;
padding:20px;
background:black;
margin-top:20px;
}

</style>

</head>

<body>

<header>
JUANDY BUTIK
</header>

<div class="banner">
🔥 Promo Fashion Terbaru 🔥
<br>
Belanja murah langsung dari toko kami
</div>

<div class="search">
<input type="text" id="search" placeholder="Cari produk..." onkeyup="searchProduct()">
</div>

<div class="container" id="productList">

<div class="product">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Baju Fashion</h3>
<div class="price">Rp120.000</div>
<button onclick="order('Baju Fashion')">Beli</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1593032465171-8b5f4c9c4c6a">
<h3>Tas Wanita</h3>
<div class="price">Rp150.000</div>
<button onclick="order('Tas Wanita')">Beli</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1528701800489-20be3c1d4c1f">
<h3>Sepatu Trend</h3>
<div class="price">Rp200.000</div>
<button onclick="order('Sepatu Trend')">Beli</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
<h3>Jaket Pria</h3>
<div class="price">Rp250.000</div>
<button onclick="order('Jaket Pria')">Beli</button>
</div>

</div>

<footer>
© 2026 JUANDY BUTIK
</footer>

<script>

function order(product){

let nomor="628123456789";

let pesan="Halo saya mau beli "+product;

window.open("https://wa.me/"+nomor+"?text="+encodeURIComponent(pesan));

}

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase();

let products=document.getElementsByClassName("product");

for(let i=0;i<products.length;i++){

let text=products[i].innerText.toLowerCase();

if(text.includes(input)){

products[i].style.display="block";

}else{

products[i].style.display="none";

}

}

}

</script>

</body>
</html>
