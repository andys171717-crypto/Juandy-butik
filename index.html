<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JUANDY BUTIK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

.page{display:none}

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

input,select{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
width:220px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
background:black;
padding:15px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:#1a1a1a;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

footer{
background:black;
padding:20px;
text-align:center;
margin-top:30px;
}

.wa{
position:fixed;
bottom:70px;
right:20px;
background:#25D366;
padding:15px;
border-radius:30px;
color:white;
text-decoration:none;
font-weight:bold;
}

.cartItem{
background:#1a1a1a;
margin:10px;
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="page center">

<h2>Login JUANDY BUTIK</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p onclick="showRegister()">Daftar akun</p>
<p onclick="forgot()">Lupa password</p>

</div>

<!-- REGISTER -->

<div id="registerPage" class="page center">

<h2>Daftar Akun</h2>

<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password minimal 5 digit">

<select id="question">
<option>Nama ibu kamu?</option>
<option>Nama hewan peliharaan?</option>
<option>Makanan favorit?</option>
</select>

<input id="answer" placeholder="Jawaban keamanan">

<button onclick="register()">Daftar</button>

<p onclick="showLogin()">Kembali login</p>

</div>

<!-- STORE -->

<div id="storePage" class="page">

<header>

<div>JUANDY BUTIK</div>

<div>

<span id="userName"></span>

<span onclick="openCart()" style="margin-left:10px;cursor:pointer;">
🛒 <span id="cartCount">0</span>
</span>

<button onclick="logout()">Logout</button>

</div>

</header>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Baju Fashion</h3>
<p>Rp120000</p>
<button onclick="addCart('Baju Fashion',120000,'p1')">Tambah</button>
<p id="p1">0 pcs</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
<h3>Tas Wanita</h3>
<p>Rp150000</p>
<button onclick="addCart('Tas Wanita',150000,'p2')">Tambah</button>
<p id="p2">0 pcs</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Sepatu Trend</h3>
<p>Rp200000</p>
<button onclick="addCart('Sepatu Trend',200000,'p3')">Tambah</button>
<p id="p3">0 pcs</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551028719-00167b16eac5">
<h3>Jaket Pria</h3>
<p>Rp250000</p>
<button onclick="addCart('Jaket Pria',250000,'p4')">Tambah</button>
<p id="p4">0 pcs</p>
</div>

</div>

<footer>

<p>© 2026 JUANDY BUTIK</p>
<p>Toko Fashion Online</p>

</footer>

</div>

<!-- CART PAGE -->

<div id="cartPage" class="page">

<header>

<div>Keranjang Belanja</div>

<button onclick="showStore()">Kembali</button>

</header>

<div id="cartList"></div>

<center>

<button onclick="checkout()">Checkout WhatsApp</button>

</center>

</div>

<a class="wa" href="https://wa.me/">Chat WhatsApp</a>

<script>

let cart={}
let totalItem=0

function hideAll(){

document.getElementById("loginPage").style.display="none"
document.getElementById("registerPage").style.display="none"
document.getElementById("storePage").style.display="none"
document.getElementById("cartPage").style.display="none"

}

function showLogin(){

hideAll()
document.getElementById("loginPage").style.display="flex"

}

function showRegister(){

hideAll()
document.getElementById("registerPage").style.display="flex"

}

function showStore(){

hideAll()
document.getElementById("storePage").style.display="block"

}

function openCart(){

hideAll()
document.getElementById("cartPage").style.display="block"

let list=""

for(let name in cart){

let item=cart[name]

list+=`
<div class="cartItem">
<h3>${name}</h3>
<p>${item.qty} pcs</p>
</div>
`

}

document.getElementById("cartList").innerHTML=list

}

function register(){

let user=regUser.value
let pass=regPass.value

if(pass.length<5){

alert("Password minimal 5 digit")
return

}

localStorage.setItem("user",user)
localStorage.setItem("pass",pass)
localStorage.setItem("question",question.value)
localStorage.setItem("answer",answer.value)

alert("Daftar berhasil")

showLogin()

}

function login(){

let user=loginUser.value
let pass=loginPass.value

if(user===localStorage.getItem("user") &&
pass===localStorage.getItem("pass")){

localStorage.setItem("login","true")

document.getElementById("userName").innerText="Hi "+user

showStore()

}else{

alert("Login gagal")

}

}

function logout(){

localStorage.removeItem("login")

showLogin()

}

function forgot(){

let q=localStorage.getItem("question")

let a=prompt(q)

if(a===localStorage.getItem("answer")){

alert("Password: "+localStorage.getItem("pass"))

}else{

alert("Jawaban salah")

}

}

function addCart(name,price,id){

if(!cart[name]){

cart[name]={qty:0,price:price}

}

cart[name].qty++

totalItem++

document.getElementById("cartCount").innerText=totalItem

document.getElementById(id).innerText=cart[name].qty+" pcs"

}

function checkout(){

let text="Pesanan JUANDY BUTIK%0A"

for(let name in cart){

text+=name+" "+cart[name].qty+" pcs%0A"

}

window.open("https://wa.me/?text="+text)

}

window.onload=function(){

if(localStorage.getItem("login")==="true"){

document.getElementById("userName").innerText="Hi "+localStorage.getItem("user")

showStore()

}else{

showLogin()

}

}

</script>

</body>
</html>
