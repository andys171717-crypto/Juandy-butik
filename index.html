<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JUANDY BUTIK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:black;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:20px;
font-weight:bold;
}

.cartBtn{
background:#25D366;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
position:relative;
}

.cartCount{
position:absolute;
top:-6px;
right:-6px;
background:red;
font-size:12px;
padding:2px 6px;
border-radius:50%;
}

/* SEARCH */

.search{
padding:10px;
background:#111;
}

.search input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
}

/* BANNER */

.banner{
overflow:hidden;
}

.slider{
display:flex;
transition:0.5s;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
height:180px;
object-fit:cover;
}

/* PRODUK */

.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:#1c1c1c;
border-radius:15px;
overflow:hidden;
text-align:center;
position:relative;
}

.sale{
position:absolute;
top:10px;
left:10px;
background:red;
padding:4px 8px;
font-size:12px;
border-radius:5px;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.nama{
font-weight:bold;
margin-top:8px;
}

.harga{
color:#ccc;
}

.rating{
color:gold;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
}

.qty button{
background:#00c853;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
}

/* CART */

.cartBox{
position:fixed;
top:0;
right:-100%;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:0.4s;
overflow:auto;
z-index:2000;
}

.cartBox.active{
right:0;
}

.checkout{
background:#25D366;
border:none;
padding:12px;
width:100%;
border-radius:8px;
margin-top:10px;
color:white;
font-weight:bold;
}

.closeCart{
background:#333;
border:none;
padding:12px;
width:100%;
border-radius:8px;
margin-top:10px;
color:white;
}

/* WA */

.wa{
position:fixed;
bottom:90px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
color:#aaa;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">JUANDY BUTIK</div>

<div class="cartBtn" onclick="toggleCart()">
<i class="fa-solid fa-cart-shopping"></i>
<div class="cartCount" id="cartCount">0</div>
</div>

</div>

<div class="search">
<input type="text" placeholder="Cari produk..." onkeyup="searchProduk(this.value)">
</div>

<!-- BANNER -->

<div class="banner">

<div class="slider" id="slider">

<div class="slide">
<img src="https://images.unsplash.com/photo-1445205170230-053b83016050">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1521334884684-d80222895322">
</div>

</div>

</div>

<!-- PRODUK -->

<div class="container" id="produk"></div>

<!-- CART -->

<div class="cartBox" id="cartBox">

<h2>Keranjang</h2>

<div id="cartItems"></div>

<h3 id="totalHarga">Total : Rp 0</h3>

<button class="checkout" onclick="checkout()">Checkout WhatsApp</button>

<button class="closeCart" onclick="toggleCart()">Tutup</button>

</div>

<div class="wa" onclick="checkout()">
<i class="fa-brands fa-whatsapp"></i>
</div>

<footer>
© 2026 JUANDY BUTIK
</footer>

<script>

/* FORMAT RUPIAH */

function rupiah(n){
return "Rp "+n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".")
}

/* PRODUK */

let produk=[

{id:1,nama:"Baju Fashion",harga:120000,rating:4.5,sale:true,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
{id:2,nama:"Tas Wanita",harga:150000,rating:4.8,sale:false,img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"},
{id:3,nama:"Sepatu Trend",harga:200000,rating:4.6,sale:true,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"}

]

let cart=JSON.parse(localStorage.getItem("cart"))||{}

/* TAMPIL PRODUK */

function tampilProduk(){

let html=""

produk.forEach(p=>{

html+=`

<div class="card">

${p.sale?'<div class="sale">SALE</div>':''}

<img src="${p.img}">

<div class="nama">${p.nama}</div>

<div class="harga">${rupiah(p.harga)}</div>

<div class="rating">⭐ ${p.rating}</div>

<div class="qty">

<button onclick="minus(${p.id})">-</button>

<span>${cart[p.id]||0}</span>

<button onclick="plus(${p.id})">+</button>

</div>

</div>

`

})

document.getElementById("produk").innerHTML=html
updateCart()

}

tampilProduk()

/* QTY */

function plus(id){

cart[id]=(cart[id]||0)+1
save()

}

function minus(id){

if(cart[id]>0) cart[id]--
save()

}

function save(){

localStorage.setItem("cart",JSON.stringify(cart))
tampilProduk()

}

/* CART */

function updateCart(){

let html=""
let total=0
let jumlah=0

produk.forEach(p=>{

let q=cart[p.id]||0

if(q>0){

let sub=q*p.harga

jumlah+=q
total+=sub

html+=`

<div style="margin-bottom:20px">

<b>${p.nama}</b>

<br>

${rupiah(p.harga)}

<br>

<div style="display:flex;gap:10px;margin-top:5px">

<button onclick="minus(${p.id})">-</button>

<span>${q}</span>

<button onclick="plus(${p.id})">+</button>

</div>

<div>Subtotal : ${rupiah(sub)}</div>

</div>

`

}

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("totalHarga").innerText="Total : "+rupiah(total)
document.getElementById("cartCount").innerText=jumlah

}

function toggleCart(){

document.getElementById("cartBox").classList.toggle("active")

}

/* CHECKOUT */

function checkout(){

let pesan="Halo saya ingin memesan:%0A%0A"

let total=0

produk.forEach(p=>{

let q=cart[p.id]||0

if(q>0){

let sub=q*p.harga

pesan+=p.nama+" x "+q+" = "+rupiah(sub)+"%0A"

total+=sub

}

})

pesan+="%0ATotal : "+rupiah(total)

window.open("https://wa.me/6281220549530?text="+pesan)

}

/* SEARCH */

function searchProduk(k){

k=k.toLowerCase()

let hasil=produk.filter(p=>p.nama.toLowerCase().includes(k))

let html=""

hasil.forEach(p=>{

html+=`

<div class="card">

<img src="${p.img}">

<div class="nama">${p.nama}</div>

<div class="harga">${rupiah(p.harga)}</div>

</div>

`

})

document.getElementById("produk").innerHTML=html

}

/* SLIDER */

let slider=document.getElementById("slider")

let index=0

setInterval(()=>{

index++

if(index>2) index=0

slider.style.transform="translateX(-"+index*100+"%)"

},3000)

</script>

</body>
</html>
