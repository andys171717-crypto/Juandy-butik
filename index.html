<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUANDY BUTIK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:#000;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
font-weight:bold;
}

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#1c1c1c;
border-radius:15px;
overflow:hidden;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.nama{
font-size:16px;
font-weight:bold;
margin-top:10px;
}

.harga{
color:#ccc;
margin-bottom:10px;
}

button{
background:#00c853;
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
cursor:pointer;
margin-bottom:15px;
font-weight:bold;
}

.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:65px;
height:65px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
cursor:pointer;
box-shadow:0 0 10px rgba(0,0,0,0.7);
}

</style>
</head>

<body>

<header>
JUANDY BUTIK
<div>🛒 <span id="cart">0</span></div>
</header>

<div class="container" id="produk"></div>

<div class="wa" onclick="checkout()">
<i class="fa-brands fa-whatsapp"></i>
</div>

<script>

const produk=[

{
nama:"Baju Fashion",
harga:120000,
img:"https://upload.wikimedia.org/wikipedia/commons/4/4a/Tshirt.svg"
},

{
nama:"Tas Wanita",
harga:150000,
img:"https://upload.wikimedia.org/wikipedia/commons/1/1b/Handbag_icon.svg"
},

{
nama:"Sepatu Trend",
harga:200000,
img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Shoes_icon.svg"
},

{
nama:"Jaket Pria",
harga:250000,
img:"https://upload.wikimedia.org/wikipedia/commons/8/8c/Jacket_icon.svg"
}

]

let cart=[]

function tampilProduk(){

let html=""

produk.forEach((p,i)=>{

html+=`
<div class="card">
<img src="${p.img}">
<div class="nama">${p.nama}</div>
<div class="harga">Rp ${p.harga}</div>
<button onclick="tambah(${i})">Tambah</button>
</div>
`

})

document.getElementById("produk").innerHTML=html

}

function tambah(i){

cart.push(produk[i])

document.getElementById("cart").innerText=cart.length

alert("Produk ditambahkan ke keranjang")

}

function checkout(){

if(cart.length==0){
alert("Keranjang kosong")
return
}

let pesan="Halo saya ingin memesan:%0A%0A"

cart.forEach(item=>{
pesan+=item.nama+" - Rp "+item.harga+"%0A"
})

window.open("https://wa.me/6281220549530?text="+pesan)

}

tampilProduk()

</script>

</body>
</html>
