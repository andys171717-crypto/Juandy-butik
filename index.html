<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUANDY BUTIK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:#000;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
font-weight:bold;
}

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#1b1b1b;
border-radius:15px;
overflow:hidden;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.nama{
font-size:16px;
font-weight:bold;
margin-top:10px;
}

.harga{
color:#bbb;
margin-bottom:10px;
}

button{
background:#00c853;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
margin-bottom:15px;
cursor:pointer;
}

button:active{
transform:scale(0.95);
}

.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
cursor:pointer;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#00c853;
padding:10px 20px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<header>

JUANDY BUTIK

<div>
🛒 <span id="cart">0</span>
</div>

</header>

<div class="container" id="produk"></div>

<div class="popup" id="popup">
Barang ditambahkan
</div>

<div class="wa" onclick="checkout()">☎</div>

<script>

let produk=[
{
nama:"Baju Fashion",
harga:120000,
img:"https://images.unsplash.com/photo-1520975922327-9f8e6f1c5f3d"
},
{
nama:"Tas Wanita",
harga:150000,
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"
},
{
nama:"Sepatu Trend",
harga:200000,
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"
},
{
nama:"Jaket Pria",
harga:250000,
img:"https://images.unsplash.com/photo-1520974735194-66f3a8a8f6f0"
}
]

let cart = JSON.parse(localStorage.getItem("cart")) || []

function tampilProduk(){

let html=""

produk.forEach((p,i)=>{

html+=`
<div class="card">

<img src="${p.img}">

<div class="nama">${p.nama}</div>

<div class="harga">Rp ${p.harga}</div>

<button onclick="tambah(${i})">Tambah</button>

</div>
`

})

document.getElementById("produk").innerHTML=html

updateCart()

}

function tambah(i){

cart.push(produk[i])

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

popup()

}

function updateCart(){

document.getElementById("cart").innerText=cart.length

}

function popup(){

let p=document.getElementById("popup")

p.style.display="block"

setTimeout(()=>{
p.style.display="none"
},1500)

}

function checkout(){

if(cart.length==0){

alert("Keranjang kosong")

return

}

let pesan="Halo saya ingin pesan:%0A%0A"

cart.forEach(p=>{

pesan+=p.nama+" - Rp "+p.harga+"%0A"

})

window.open("https://wa.me/?text="+pesan)

}

tampilProduk()

</script>

</body>
</html>
