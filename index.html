<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JUANDY BUTIK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(270deg,#ff512f,#ff9966,#ff512f);
background-size:600% 600%;
animation:bg 8s infinite;
}

@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

.page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:25px;
border-radius:12px;
width:300px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

.password{
position:relative;
}

.password i{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#ff512f;
color:white;
}

.link{
margin-top:10px;
text-align:center;
color:blue;
cursor:pointer;
font-size:14px;
}

.shop{
display:none;
padding:20px;
}

.product{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

.logout{
position:fixed;
top:10px;
right:10px;
background:red;
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="page">

<div class="box">

<h2>Login</h2>

<input id="loginUser" placeholder="Username">

<div class="password">
<input id="loginPass" type="password" placeholder="Password">
<i class="fa fa-eye" onclick="lihat('loginPass')"></i>
</div>

<button onclick="login()">Login</button>

<div class="link" onclick="showDaftar()">Daftar akun</div>
<div class="link" onclick="lupa()">Lupa password?</div>

</div>
</div>

<!-- DAFTAR -->

<div id="daftarPage" class="page" style="display:none">

<div class="box">

<h2>Daftar Akun</h2>

<input id="user" placeholder="Username">

<div class="password">
<input id="pass" type="password" placeholder="Password">
<i class="fa fa-eye" onclick="lihat('pass')"></i>
</div>

<input id="q1" placeholder="Pertanyaan 1: Nama ibu kamu?">
<input id="a1" placeholder="Jawaban">

<input id="q2" placeholder="Pertanyaan 2: Nama hewan peliharaan?">
<input id="a2" placeholder="Jawaban">

<input id="q3" placeholder="Pertanyaan 3: Kota kelahiran kamu?">
<input id="a3" placeholder="Jawaban">

<button onclick="daftar()">Daftar</button>

<div class="link" onclick="showLogin()">Kembali Login</div>

</div>
</div>

<!-- HALAMAN TOKO -->

<div id="shopPage" class="shop">

<div class="logout" onclick="logout()">Logout</div>

<h2>Halaman Belanja</h2>

<div class="product">
Baju wanita<br>
Harga : Rp120.000
</div>

<div class="product">
Tas wanita<br>
Harga : Rp250.000
</div>

<div class="product">
Sepatu wanita<br>
Harga : Rp300.000
</div>

</div>


<script>

/* cek stay login */

if(localStorage.getItem("login")=="yes"){

document.getElementById("loginPage").style.display="none"
document.getElementById("shopPage").style.display="block"

}

/* pindah halaman */

function showDaftar(){

document.getElementById("loginPage").style.display="none"
document.getElementById("daftarPage").style.display="flex"

}

function showLogin(){

document.getElementById("daftarPage").style.display="none"
document.getElementById("loginPage").style.display="flex"

}

/* lihat password */

function lihat(id){

let x=document.getElementById(id)

if(x.type=="password"){
x.type="text"
}else{
x.type="password"
}

}

/* daftar */

function daftar(){

let username=document.getElementById("user").value
let password=document.getElementById("pass").value

if(password.length<5){

alert("Password minimal 5 digit")
return

}

localStorage.setItem("user",username)
localStorage.setItem("pass",password)

localStorage.setItem("q1",q1.value)
localStorage.setItem("a1",a1.value)

localStorage.setItem("q2",q2.value)
localStorage.setItem("a2",a2.value)

localStorage.setItem("q3",q3.value)
localStorage.setItem("a3",a3.value)

alert("Akun berhasil dibuat")

showLogin()

}

/* login */

function login(){

let u=document.getElementById("loginUser").value
let p=document.getElementById("loginPass").value

if(u==localStorage.getItem("user") && p==localStorage.getItem("pass")){

alert("Login berhasil")

localStorage.setItem("login","yes")

document.getElementById("loginPage").style.display="none"
document.getElementById("shopPage").style.display="block"

}else{

alert("Username atau password salah")

}

}

/* logout */

function logout(){

localStorage.removeItem("login")

location.reload()

}

/* lupa password */

function lupa(){

let j1=prompt(localStorage.getItem("q1"))
let j2=prompt(localStorage.getItem("q2"))
let j3=prompt(localStorage.getItem("q3"))

if(j1==localStorage.getItem("a1") &&
j2==localStorage.getItem("a2") &&
j3==localStorage.getItem("a3")){

let baru=prompt("Masukkan password baru")

if(baru.length<5){

alert("Password minimal 5 digit")
return

}

localStorage.setItem("pass",baru)

alert("Password berhasil diganti")

}else{

alert("Jawaban salah")

}

}

</script>

</body>
</html>
