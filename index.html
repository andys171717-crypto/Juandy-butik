<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JUANDY BUTIK</title>

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

.header{
background:black;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:#1c1c1c;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

button{
background:#00c853;
border:none;
padding:10px;
border-radius:8px;
color:white;
margin-top:5px;
}

.login{
text-align:center;
margin-top:120px;
}

.login input{
padding:10px;
width:200px;
margin:8px;
border-radius:8px;
border:none;
}

.cart{
cursor:pointer;
margin-left:10px;
}

.cartPage{
display:none;
padding:20px;
}

.total{
font-size:20px;
margin-top:10px;
color:#00e676;
}

.wa{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.wa img{
width:35px;
}

</style>
</head>

<body>

<div id="loginPage" class="login">

<h2>Login JUANDY BUTIK</h2>

<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p onclick="daftar()">Daftar</p>
<p onclick="lupa()">Lupa Password</p>

</div>

<div id="shop" style="display:none">

<div class="header">

<b>JUANDY BUTIK</b>

<div>
Hi <span id="namaUser"></span>

<span class="cart" onclick="bukaCart()">🛒
<span id="jumlahCart">0</span>
</span>

<button onclick="logout()">Logout</button>

</div>

</div>

<div class="grid" id="produk"></div>

</div>

<div id="cartPage" class="cartPage">

<h2>Keranjang</h2>

<div id="listCart"></div>

<div class="total" id="totalHarga"></div>

<button onclick="checkout()">Checkout WhatsApp</button>

<br><br>

<button onclick="kembali()">Kembali</button>

</div>

<a href="https://wa.me/6281220549530" class="wa">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>

let produk=[

{nama:"Baju Fashion",harga:120000,img:"https://images.unsplash.com/photo-1520975922284-8b456906c813",pcs:0},

{nama:"Tas Wanita",harga:150000,img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3",pcs:0},

{nama:"Sepatu Trend",harga:200000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff",pcs:0},

{nama:"Jaket Pria",harga:250000,img:"https://images.unsplash.com/photo-1520974735194-9c7e70c4b6f7",pcs:0}

]

function tampilProduk(){

let html=""

produk.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.nama}</h3>

<p>Rp ${p.harga}</p>

<button onclick="tambah(${i})">Tambah</button>

<p>${p.pcs} pcs</p>

</div>

`

})

document.getElementById("produk").innerHTML=html

updateCart()

}

function tambah(i){

produk[i].pcs++

tampilProduk()

}

function updateCart(){

let total=0

produk.forEach(p=>{

total+=p.pcs

})

document.getElementById("jumlahCart").innerText=total

}

function bukaCart(){

document.getElementById("shop").style.display="none"

document.getElementById("cartPage").style.display="block"

let html=""
let total=0

produk.forEach(p=>{

if(p.pcs>0){

let harga=p.harga*p.pcs

total+=harga

html+=`

<p>${p.nama} - ${p.pcs} pcs - Rp ${harga}</p>

`

}

})

document.getElementById("listCart").innerHTML=html

document.getElementById("totalHarga").innerText="Total Rp "+total

}

function kembali(){

document.getElementById("cartPage").style.display="none"

document.getElementById("shop").style.display="block"

}

function checkout(){

let pesan="Halo saya ingin pesan:%0A"

let total=0

produk.forEach(p=>{

if(p.pcs>0){

let harga=p.harga*p.pcs

total+=harga

pesan+=p.nama+" "+p.pcs+" pcs - Rp "+harga+"%0A"

}

})

pesan+="Total: Rp "+total

window.open("https://wa.me/6281220549530?text="+pesan)

}

function login(){

let u=document.getElementById("username").value

let p=document.getElementById("password").value

let data=JSON.parse(localStorage.getItem("akun"))

if(!data){

alert("Silakan daftar dulu")

return

}

if(u==data.user && p==data.pass){

document.getElementById("loginPage").style.display="none"

document.getElementById("shop").style.display="block"

document.getElementById("namaUser").innerText=u

tampilProduk()

}else{

alert("Login salah")

}

}

function daftar(){

let u=prompt("Buat username")

let p=prompt("Buat password minimal 5 karakter")

if(p.length<5){

alert("Password minimal 5 karakter")

return

}

let q=prompt("Pertanyaan keamanan")

let a=prompt("Jawaban")

localStorage.setItem("akun",JSON.stringify({

user:u,

pass:p,

q:q,

a:a

}))

alert("Akun berhasil dibuat")

}

function lupa(){

let data=JSON.parse(localStorage.getItem("akun"))

let j=prompt(data.q)

if(j==data.a){

alert("Password kamu: "+data.pass)

}else{

alert("Jawaban salah")

}

}

function logout(){

location.reload()

}

</script>

</body>
</html>
