<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUANDY BUTIK</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
}

/* HEADER */

header{
background:black;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
letter-spacing:2px;
position:sticky;
top:0;
z-index:1000;
}

/* CART */

.cart{
position:absolute;
right:15px;
top:12px;
background:#00c853;
padding:8px 15px;
border-radius:20px;
font-weight:bold;
}

/* BANNER */

.banner{
background: linear-gradient(135deg,#6a11cb,#2575fc);
padding:60px 20px;
text-align:center;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.banner p{
font-size:18px;
opacity:0.9;
}

.banner button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

/* SEARCH */

.search{
padding:20px;
text-align:center;
}

.search input{
width:90%;
padding:12px;
border-radius:10px;
border:none;
font-size:15px;
}

/* PRODUK GRID */

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#1a1a1a;
border-radius:15px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin:10px 0 5px 0;
font-size:16px;
}

.price{
color:#00e676;
font-size:16px;
font-weight:bold;
margin-bottom:8px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

/* CHECKOUT */

.checkout{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#00c853;
padding:15px 30px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

/* TOAST */

.toast{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
background:#00c853;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
color:#888;
}

</style>
</head>

<body>

<header>
JUANDY BUTIK
<div class="cart">🛒 <span id="cart">0</span></div>
</header>

<div class="banner">
<p>Fashion Trend • Harga Terbaik • Kualitas Premium</p>
<button onclick="scrollProduk()">Belanja Sekarang</button>
</div>

<div class="search">
<input type="text" id="search" placeholder="Cari produk..." onkeyup="searchProduk()">
</div>

<div class="container" id="produk">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Baju Fashion</h3>
<div class="price">Rp120000</div>
<button onclick="tambah('Baju Fashion',120000)">Tambah</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
<h3>Tas Wanita</h3>
<div class="price">Rp150000</div>
<button onclick="tambah('Tas Wanita',150000)">Tambah</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Sepatu Trend</h3>
<div class="price">Rp200000</div>
<button onclick="tambah('Sepatu Trend',200000)">Tambah</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551028719-00167b16eac5">
<h3>Jaket Pria</h3>
<div class="price">Rp250000</div>
<button onclick="tambah('Jaket Pria',250000)">Tambah</button>
</div>

</div>

<div class="checkout" onclick="checkout()">Checkout WhatsApp</div>

<footer>
© 2026 JUANDY BUTIK
</footer>

<script>

let cart=[]
let jumlah=0

function tambah(nama,harga){

cart.push({nama:nama,harga:harga})
jumlah++

document.getElementById("cart").innerText=jumlah

toast("Produk ditambahkan")

}

function toast(text){

let t=document.createElement("div")
t.className="toast"
t.innerText=text

document.body.appendChild(t)

setTimeout(()=>{
t.remove()
},2000)

}

function checkout(){

if(cart.length==0){
toast("Keranjang kosong")
return
}

let pesan="Halo saya ingin membeli:%0A%0A"
let total=0

cart.forEach(item=>{
pesan+=item.nama+" - Rp"+item.harga+"%0A"
total+=item.harga
})

pesan+="%0ATotal: Rp"+total

window.open("https://wa.me/6281220549530?text="+pesan)

}

function searchProduk(){

let input=document.getElementById("search").value.toLowerCase()

let card=document.getElementsByClassName("card")

for(let i=0;i<card.length;i++){

let text=card[i].innerText.toLowerCase()

if(text.includes(input)){
card[i].style.display="block"
}else{
card[i].style.display="none"
}

}

}

function scrollProduk(){
document.getElementById("produk").scrollIntoView({behavior:"smooth"})
}

</script>

</body>
</html>
