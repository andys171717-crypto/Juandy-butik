<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUANDY BUTIK</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#000;
}

.logo{
    font-size:20px;
    font-weight:bold;
}

.cart{
    background:#00c853;
    padding:10px 15px;
    border-radius:25px;
    cursor:pointer;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.card{
    background:#111;
    padding:10px;
    border-radius:15px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:10px;
}

.price{
    color:#00e676;
    font-size:18px;
    margin:5px;
}

button{
    background:#00c853;
    border:none;
    padding:8px 15px;
    border-radius:8px;
    color:white;
    margin-top:5px;
}

.pcs{
    margin-top:5px;
    color:#aaa;
}

.popup{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#111;
    padding:20px;
    border-radius:20px 20px 0 0;
    display:none;
}

.popup.active{
    display:block;
}

footer{
    text-align:center;
    padding:30px;
    color:#888;
}

.waFloat{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    padding:15px;
    border-radius:30px;
    font-weight:bold;
    color:white;
    text-decoration:none;
}

</style>

</head>
<body>

<!-- LOGIN -->

<div id="loginPage" style="display:none; text-align:center;">
    <h2>Login JUANDY BUTIK</h2>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p>Belum punya akun? <span onclick="showRegister()" style="color:#00e676;cursor:pointer;">Daftar</span></p>
    <p style="color:#00e676;cursor:pointer;" onclick="lupaPassword()">Lupa Password?</p>
</div>

<!-- REGISTER -->

<div id="registerPage" style="display:none; text-align:center;">
    <h2>Daftar Akun</h2>
    <input id="reg_user" placeholder="Username">
    <input id="reg_pass" type="password" placeholder="Password minimal 5 digit">
    <select id="pertanyaan">
        <option>Apa nama hewan peliharaan pertama?</option>
        <option>Siapa nama ibu kamu?</option>
        <option>Apa makanan favorit kamu?</option>
    </select>
    <input id="jawaban" placeholder="Jawaban keamanan">
    <button onclick="register()">Daftar</button>
    <p>Sudah punya akun? <span onclick="showLogin()" style="color:#00e676;cursor:pointer;">Login</span></p>
</div>

<!-- STORE -->

<div id="store" style="display:none;">

<header>
    <div class="logo">JUANDY BUTIK</div>
    <div class="cart" onclick="openCart()">🛒 <span id="cartCount">0</span></div>
</header>

<div class="grid">

<div class="card">
    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
    <h3>Baju Fashion</h3>
    <div class="price">Rp120000</div>
    <button onclick="add('Baju Fashion', 120000, 'q1')">Tambah</button>
    <div class="pcs" id="q1">0 pcs</div>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
    <h3>Tas Wanita</h3>
    <div class="price">Rp150000</div>
    <button onclick="add('Tas Wanita', 150000, 'q2')">Tambah</button>
    <div class="pcs" id="q2">0 pcs</div>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
    <h3>Sepatu Trend</h3>
    <div class="price">Rp200000</div>
    <button onclick="add('Sepatu Trend', 200000, 'q3')">Tambah</button>
    <div class="pcs" id="q3">0 pcs</div>
</div>

<div class="card">
    <img src="https://images.unsplash.com/photo-1551028719-00167b16eac5">
    <h3>Jaket Pria</h3>
    <div class="price">Rp250000</div>
    <button onclick="add('Jaket Pria', 250000, 'q4')">Tambah</button>
    <div class="pcs" id="q4">0 pcs</div>
</div>

</div>
</div>

<!-- KERANJANG -->

<div id="cartPopup" class="popup">
    <h2>Keranjang Belanja</h2>
    <div id="cartItems"></div>
    <h3 id="total"></h3>
    <button onclick="checkout()">Checkout WhatsApp</button>
    <button onclick="closeCart()">Tutup</button>
</div>

<!-- WA BUTTON -->

<a href="https://wa.me/6281220549530" target="_blank" class="waFloat">Chat WhatsApp</a>

<script>

let cart = {};
let totalItem = 0;

// SHOW / HIDE REGISTER & LOGIN

function showRegister(){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("registerPage").style.display = "flex";
}

function showLogin(){
    document.getElementById("registerPage").style.display = "none";
    document.getElementById("loginPage").style.display = "flex";
}

// REGISTER FUNCTION

function register() {
    let username = document.getElementById("reg_user").value;
    let password = document.getElementById("reg_pass").value;
    let question = document.getElementById("pertanyaan").value;
    let answer = document.getElementById("jawaban").value;

    if (password.length < 5) {
        alert("Password minimal 5 digit!");
        return;
    }

    localStorage.setItem("user", username);
    localStorage.setItem("pass", password);
    localStorage.setItem("question", question);
    localStorage.setItem("answer", answer);

    alert("Pendaftaran berhasil");
    showLogin();
}

// LOGIN FUNCTION

function login() {
    let username = document.getElementById("loginUser").value;
    let password = document.getElementById("loginPass").value;
    
    let savedUser = localStorage.getItem("user");
    let savedPass = localStorage.getItem("pass");

    if (username === savedUser && password === savedPass) {
        localStorage.setItem("login", "true");
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("store").style.display = "block";
        document.getElementById("halo").innerText = "Halo " + savedUser;
    } else {
        alert("Username atau Password salah!");
    }
}

// PASSWORD RESET FUNCTION

function lupaPassword() {
    let username = prompt("Masukkan username");

    let savedUser = localStorage.getItem("user");
    if (username !== savedUser) {
        alert("Username tidak ditemukan");
        return;
    }

    let question = localStorage.getItem("question");
    let answer = prompt(question);

    let realAnswer = localStorage.getItem("answer");

    if (answer === realAnswer) {
        let newPassword = prompt("Masukkan password baru");

        if (newPassword.length < 5) {
            alert("Password minimal 5 digit");
            return;
        }

        localStorage.setItem("pass", newPassword);
        alert("Password berhasil diganti");
    } else {
        alert("Jawaban salah");
    }
}

// ADD TO CART

function add(name, price, id) {
    if (!cart[name]) {
        cart[name] = { qty: 0, price: price };
    }

    cart[name].qty++;
    totalItem++;
    document.getElementById("cartCount").innerText = totalItem;
    document.getElementById(id).innerText = cart[name].qty + " pcs";
}

// OPEN / CLOSE CART

function openCart() {
    let items = document.getElementById("cartItems");
    items.innerHTML = "";

    let total = 0;
    for (let name in cart) {
        let item = cart[name];
        let subtotal = item.qty * item.price;
        total += subtotal;
        items.innerHTML += name + " (" + item.qty + " pcs) - Rp" + subtotal + "<br><br>";
    }

    document.getElementById("total").innerText = "Total: Rp" + total;
    document.getElementById("cartPopup").classList.add("active");
}

function closeCart() {
    document.getElementById("cartPopup").classList.remove("active");
}

// CHECKOUT

function checkout() {
    let text = "Pesanan JUANDY BUTIK%0A";
    let total = 0;

    for (let name in cart) {
        let item = cart[name];
        let subtotal = item.qty * item.price;
        total += subtotal;
        text += name + " (" + item.qty + " pcs) - Rp" + subtotal + "%0A";
    }

    text += "%0ATotal: Rp" + total;
    window.open("https://wa.me/6281220549530?text=" + text);
}

// LOGOUT

function logout() {
    localStorage.removeItem("login");
    location.reload();
}

// STAY LOGIN FUNCTION

window.onload = function() {
    let login = localStorage.getItem("login");
    if (login === "true") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("store").style.display = "block";
    }
}

</script>

</body>
</html>
