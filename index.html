<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JUANDY BUTIK</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:black;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:20px;
font-weight:bold;
}

.cartBtn{
background:#25D366;
padding:10px 14px;
border-radius:20px;
cursor:pointer;
position:relative;
}

.cartCount{
position:absolute;
top:-5px;
right:-5px;
background:red;
padding:2px 6px;
font-size:12px;
border-radius:50%;
}

/* SEARCH */

.search{
padding:10px;
background:#111;
}

.search input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
}

/* BANNER */

.banner{
width:100%;
overflow:hidden;
position:relative;
}

.slider{
display:flex;
transition:0.4s;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
height:180px;
object-fit:cover;
}

.dots{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#aaa;
}

.dot.active{
background:#00e676;
}

/* PRODUK */

.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:#1a1a1a;
border-radius:16px;
overflow:hidden;
box-shadow:0 3px 8px rgba(0,0,0,0.5);
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
cursor:pointer;
}

.nama{
padding:8px;
font-size:15px;
}

.harga{
color:#00e676;
font-weight:bold;
padding:0 8px;
}

.rating{
padding:0 8px;
color:#ffc107;
font-size:13px;
}

/* QTY */

.qty{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

.qty button{
width:28px;
height:28px;
background:#00c853;
border:none;
border-radius:6px;
color:white;
font-size:18px;
}

.qty input{
width:40px;
text-align:center;
border:none;
background:#222;
color:white;
border-radius:6px;
}

/* CART */

.cartBox{
position:fixed;
top:0;
right:0;
width:320px;
height:100%;
background:#111;
transform:translateX(100%);
transition:0.3s;
padding:20px;
overflow:auto;
z-index:2000;
}

.cartBox.active{
transform:translateX(0);
}

.cartHeader{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.cartHeader button{
background:#333;
border:none;
color:white;
width:35px;
height:35px;
border-radius:8px;
}

.closeCart{
margin-left:auto;
background:red;
}

.cartItem{
display:flex;
gap:10px;
margin-bottom:10px;
}

.cartItem img{
width:50px;
height:50px;
border-radius:6px;
object-fit:cover;
}

.remove{
background:red;
border:none;
color:white;
border-radius:4px;
padding:3px 6px;
}

.checkout{
background:#25D366;
border:none;
padding:12px;
width:100%;
border-radius:10px;
color:white;
margin-top:10px;
}

/* DETAIL PRODUK */

.detailPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:3000;
}

.detailBox{
background:#1a1a1a;
padding:20px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
}

.detailBox img{
width:100%;
border-radius:10px;
}

.detailBtn{
background:#25D366;
border:none;
padding:12px;
width:100%;
border-radius:10px;
margin-top:10px;
color:white;
}

.closeDetail{
position:absolute;
top:20px;
right:20px;
font-size:24px;
cursor:pointer;
}

/* WHATSAPP FLOAT */

.waFloat{
position:fixed;
bottom:80px;
right:20px;
width:55px;
height:55px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
z-index:1000;
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #333;
}

.menu{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
}

.menu i{
font-size:18px;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">JUANDY BUTIK</div>

<div class="cartBtn" onclick="toggleCart()">
<i class="fa-solid fa-cart-shopping"></i>
<div class="cartCount" id="cartCount">0</div>
</div>
</div>

<div class="search">
<input type="text" placeholder="Cari produk..." onkeyup="filterProduk(this.value)">
</div>

<!-- BANNER -->

<div class="banner">

<div class="slider" id="slider">

<div class="slide">
<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1521334884684-d80222895322">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1445205170230-053b83016050">
</div>

</div>

<div class="dots">
<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

</div>

<div class="container" id="produk"></div>

<!-- CART -->

<div class="cartBox" id="cartBox">

<div class="cartHeader">

<button onclick="toggleCart()">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h3>Keranjang</h3>

<button class="closeCart" onclick="toggleCart()">
<i class="fa-solid fa-xmark"></i>
</button>

</div>

<div id="cartItems"></div>

<h3 id="totalHarga">Total : Rp 0</h3>

<button class="checkout" onclick="checkout()">Checkout WhatsApp</button>

</div>

<!-- DETAIL -->

<div id="detailProduk" class="detailPopup">

<div class="detailBox">

<span class="closeDetail" onclick="closeDetail()">✕</span>

<img id="detailImg">

<h2 id="detailNama"></h2>

<p id="detailHarga"></p>

<p id="detailRating"></p>

<button class="detailBtn" onclick="toggleCart()">
Tambah ke Keranjang
</button>

</div>

</div>

<!-- WA FLOAT -->

<div class="waFloat" onclick="openWA()">
<i class="fa-brands fa-whatsapp"></i>
</div>

<!-- FOOTER -->

<div class="footer">

<div class="menu">
<i class="fa-solid fa-house"></i>
Home
</div>

<div class="menu" onclick="toggleCart()">
<i class="fa-solid fa-cart-shopping"></i>
Cart
</div>

<div class="menu" onclick="openWA()">
<i class="fa-brands fa-whatsapp"></i>
Chat
</div>

</div>

<script>

/* DATA PRODUK */

let produk=[

{id:1,nama:"Baju Fashion",harga:120000,rating:4.5,
img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},

{id:2,nama:"Tas Wanita",harga:150000,rating:4.8,
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"},

{id:3,nama:"Sepatu Trend",harga:200000,rating:4.6,
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},

{id:4,nama:"Jaket Pria",harga:250000,rating:4.7,
img:"https://images.unsplash.com/photo-1520975922284-9f8c2c2bdf1a"}

]

let cart=JSON.parse(localStorage.getItem("cart"))||{}

/* FORMAT RUPIAH */

function rupiah(n){
return "Rp "+n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".")
}

/* RENDER */

function renderProduk(data=produk){

let html=""

data.forEach(p=>{

html+=`

<div class="card">

<img src="${p.img}" onclick="openDetail(${p.id})">

<div class="nama">${p.nama}</div>

<div class="harga">${rupiah(p.harga)}</div>

<div class="rating">⭐ ${p.rating}</div>

<div class="qty">

<button onclick="minus(${p.id})">-</button>

<input type="number" value="${cart[p.id]||0}" min="0"
onchange="setQty(${p.id},this.value)">

<button onclick="plus(${p.id})">+</button>

</div>

</div>

`

})

document.getElementById("produk").innerHTML=html

updateCart()

}

renderProduk()

/* QTY */

function plus(id){cart[id]=(cart[id]||0)+1;save()}
function minus(id){if(cart[id]>0)cart[id]--;save()}
function setQty(id,val){val=parseInt(val);if(val<=0)delete cart[id];else cart[id]=val;save()}

function save(){
localStorage.setItem("cart",JSON.stringify(cart))
renderProduk()
}

/* CART */

function updateCart(){

let total=0
let jumlah=0
let html=""

produk.forEach(p=>{

let q=cart[p.id]||0

if(q>0){

let sub=q*p.harga

total+=sub
jumlah+=q

html+=`
<div class="cartItem">
<img src="${p.img}">
<div>
<b>${p.nama}</b>
<div>${rupiah(sub)}</div>
<button class="remove" onclick="removeItem(${p.id})">Hapus</button>
</div>
</div>
`

}

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("cartCount").innerText=jumlah
document.getElementById("totalHarga").innerText="Total : "+rupiah(total)

}

function removeItem(id){delete cart[id];save()}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active")
}

/* DETAIL */

function openDetail(id){

let p=produk.find(x=>x.id===id)

detailImg.src=p.img
detailNama.innerText=p.nama
detailHarga.innerText=rupiah(p.harga)
detailRating.innerText="⭐ "+p.rating

detailProduk.style.display="flex"

}

function closeDetail(){
detailProduk.style.display="none"
}

/* SEARCH */

function filterProduk(k){

k=k.toLowerCase()

let hasil=produk.filter(p=>p.nama.toLowerCase().includes(k))

renderProduk(hasil)

}

/* WA */

function openWA(){
window.open("https://wa.me/6281220549530")
}

/* CHECKOUT */

function checkout(){

let pesan="Halo saya ingin pesan:%0A"

produk.forEach(p=>{

let q=cart[p.id]||0

if(q>0){

pesan+=p.nama+" x "+q+"%0A"

}

})

window.open("https://wa.me/6281220549530?text="+pesan)

}

/* BANNER */

let slider=document.getElementById("slider")
let dots=document.querySelectorAll(".dot")

let index=0

function showSlide(){

slider.style.transform="translateX(-"+index*100+"%)"

dots.forEach(d=>d.classList.remove("active"))

dots[index].classList.add("active")

}

setInterval(()=>{

index++

if(index>2)index=0

showSlide()

},3000)

</script>

</body>
</html>
