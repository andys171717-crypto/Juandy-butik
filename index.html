<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JUANDY SHOP</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(270deg,#ff512f,#ff9966);
}

.page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:25px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#ff512f;
color:white;
}

.link{
margin-top:10px;
text-align:center;
color:blue;
cursor:pointer;
}

.shop{
display:none;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.cart{
position:fixed;
top:10px;
left:10px;
background:black;
color:white;
padding:8px 12px;
border-radius:6px;
}

.logout{
position:fixed;
top:10px;
right:10px;
background:red;
color:white;
padding:8px 12px;
border-radius:6px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="page">

<div class="box">

<h2>Login</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="link" onclick="showDaftar()">Daftar akun</div>

</div>
</div>


<!-- DAFTAR -->

<div id="daftarPage" class="page" style="display:none">

<div class="box">

<h2>Daftar</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="daftar()">Daftar</button>

<div class="link" onclick="showLogin()">Kembali Login</div>

</div>
</div>


<!-- TOKO -->

<div id="shopPage" class="shop">

<div class="cart">
Cart : <span id="jumlahCart">0</span>
</div>

<div class="logout" onclick="logout()">Logout</div>

<h2>Halaman Belanja</h2>


<div class="product">

Baju wanita  
<br>Harga : Rp120000

<button onclick="tambahCart('Baju wanita',120000)">
Tambah keranjang
</button>

</div>


<div class="product">

Tas wanita  
<br>Harga : Rp250000

<button onclick="tambahCart('Tas wanita',250000)">
Tambah keranjang
</button>

</div>


<div class="product">

Sepatu wanita  
<br>Harga : Rp300000

<button onclick="tambahCart('Sepatu wanita',300000)">
Tambah keranjang
</button>

</div>

<br>

<button onclick="checkout()">Checkout via WhatsApp</button>

</div>


<script>

/* login tetap */

if(localStorage.getItem("login")=="yes"){

loginSukses()

}


/* pindah halaman */

function showDaftar(){

loginPage.style.display="none"
daftarPage.style.display="flex"

}

function showLogin(){

daftarPage.style.display="none"
loginPage.style.display="flex"

}


/* daftar */

function daftar(){

localStorage.setItem("user",user.value)
localStorage.setItem("pass",pass.value)

alert("Akun berhasil dibuat")

showLogin()

}


/* login */

function login(){

if(loginUser.value==localStorage.getItem("user") &&
loginPass.value==localStorage.getItem("pass")){

localStorage.setItem("login","yes")

loginSukses()

}else{

alert("Login gagal")

}

}


function loginSukses(){

loginPage.style.display="none"
shopPage.style.display="block"

}


/* logout */

function logout(){

localStorage.removeItem("login")

location.reload()

}


/* cart */

let cart=[]

function tambahCart(nama,harga){

cart.push({nama,harga})

jumlahCart.innerText=cart.length

alert("Ditambahkan ke keranjang")

}


/* checkout */

function checkout(){

let pesan="Pesanan:%0A"

let total=0

cart.forEach(item=>{

pesan+=item.nama+" - Rp"+item.harga+"%0A"

total+=item.harga

})

pesan+="Total: Rp"+total

window.open("https://wa.me/6280000000000?text="+pesan)

}

</script>

</body>
</html>
