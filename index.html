<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JUANDY BUTIK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

.header{
position:sticky;
top:0;
background:#000;
padding:10px;
z-index:1000;
}

.headerTop{
display:flex;
align-items:center;
gap:10px;
}

.logo{
font-weight:bold;
font-size:18px;
}

.searchBox{
flex:1;
}

.searchBox input{
width:100%;
padding:10px;
border-radius:20px;
border:none;
}

.cartBtn{
background:#25D366;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
position:relative;
cursor:pointer;
}

.cartBtn.shake{
animation:shake .4s;
}

@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(10deg)}
50%{transform:rotate(-10deg)}
75%{transform:rotate(10deg)}
100%{transform:rotate(0)}
}

.cartCount{
position:absolute;
top:-5px;
right:-5px;
background:red;
font-size:11px;
padding:2px 5px;
border-radius:50%;
}

/* KATEGORI */

.kategori{
display:flex;
overflow:auto;
gap:10px;
padding:10px;
}

.kategori button{
background:#1c1c1c;
border:none;
color:white;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

/* BANNER */

.banner{
padding:10px;
}

.slider{
display:flex;
transition:transform .5s;
border-radius:10px;
overflow:hidden;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
height:180px;
object-fit:cover;
}

/* DOT */

.dots{
display:flex;
justify-content:center;
gap:6px;
margin-top:5px;
}

.dot{
width:8px;
height:8px;
background:#888;
border-radius:50%;
}

.dot.active{
background:#25D366;
}

/* PRODUK */

.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:#1c1c1c;
border-radius:14px;
overflow:hidden;
position:relative;
}

.sale{
position:absolute;
top:8px;
left:8px;
background:red;
font-size:12px;
padding:3px 6px;
border-radius:5px;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
cursor:pointer;
}

.info{
padding:10px;
}

.nama{
font-size:14px;
font-weight:bold;
}

.harga{
color:#25D366;
font-weight:bold;
}

.rating{
color:gold;
font-size:12px;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:8px;
}

.qty button{
background:#25D366;
border:none;
padding:5px 8px;
border-radius:5px;
color:white;
}

/* CART */

.cartBox{
position:fixed;
top:0;
right:0;
width:320px;
height:100%;
background:#111;
transform:translateX(100%);
transition:.3s;
padding:20px;
overflow:auto;
z-index:2000;
}

.cartBox.active{
transform:translateX(0);
}

.cartItem{
display:flex;
gap:10px;
margin-bottom:12px;
}

.cartItem img{
width:50px;
height:50px;
border-radius:6px;
object-fit:cover;
}

.checkout{
background:#25D366;
border:none;
padding:12px;
width:100%;
border-radius:8px;
margin-top:10px;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
z-index:3000;
}

.popupContent{
background:#222;
padding:20px;
border-radius:10px;
width:80%;
max-width:320px;
text-align:center;
}

.popupContent img{
width:100%;
border-radius:10px;
}

/* WA */

.wa{
position:fixed;
bottom:80px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

</style>
</head>

<body>

<div class="header">

<div class="headerTop">

<div class="logo">JUANDY BUTIK</div>

<div class="searchBox">
<input type="text" id="searchInput" placeholder="Cari produk..." onkeyup="filterProduk()">
</div>

<div class="cartBtn" onclick="toggleCart()">
<i class="fa fa-shopping-cart"></i>
<div class="cartCount" id="cartCount">0</div>
</div>

</div>

</div>

<div class="kategori">

<button onclick="filterKategori('all')">Semua</button>
<button onclick="filterKategori('baju')">Baju</button>
<button onclick="filterKategori('tas')">Tas</button>
<button onclick="filterKategori('sepatu')">Sepatu</button>
<button onclick="filterKategori('jaket')">Jaket</button>

</div>

<div class="banner">

<div class="slider" id="slider">

<div class="slide">
<img src="https://images.unsplash.com/photo-1521334884684-d80222895322">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1445205170230-053b83016050">
</div>

</div>

<div class="dots">
<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

</div>

<div class="container" id="produk"></div>

<div class="cartBox" id="cartBox">

<h2>Keranjang</h2>

<div id="cartItems"></div>

<h3 id="totalHarga"></h3>

<button class="checkout" onclick="checkout()">Checkout</button>

</div>

<div class="popup" id="popup">

<div class="popupContent">

<img id="popupImg">

<h3 id="popupNama"></h3>

<p id="popupHarga"></p>

<button onclick="tambahPopup()">Tambah ke Keranjang</button>
<br><br>
<button onclick="closePopup()">Tutup</button>

</div>

</div>

<div class="wa" onclick="checkout()">
<i class="fa-brands fa-whatsapp"></i>
</div>

<script>

/* FORMAT RUPIAH */

function rupiah(n){
return "Rp "+n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".")
}

/* DATA PRODUK */

let produk=[

{id:1,nama:"Baju Fashion",kategori:"baju",harga:120000,rating:4.5,sale:true,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},

{id:2,nama:"Tas Wanita",kategori:"tas",harga:150000,rating:4.8,sale:false,img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"},

{id:3,nama:"Sepatu Trend",kategori:"sepatu",harga:200000,rating:4.6,sale:true,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},

{id:4,nama:"Jaket Pria",kategori:"jaket",harga:250000,rating:4.4,sale:false,img:"https://images.unsplash.com/photo-1548883354-7622d03aca27"}

]

let cart=JSON.parse(localStorage.getItem("cart"))||{}

let currentProduk=null

/* RENDER PRODUK */

function renderProduk(data){

let html=""

data.forEach(p=>{

html+=`

<div class="card">

${p.sale?'<div class="sale">SALE</div>':''}

<img src="${p.img}" onclick="detailProduk(${p.id})">

<div class="info">

<div class="nama">${p.nama}</div>

<div class="harga">${rupiah(p.harga)}</div>

<div class="rating">⭐ ${p.rating}</div>

<div class="qty">

<button onclick="minus(${p.id})">-</button>

<span>${cart[p.id]||0}</span>

<button onclick="plus(${p.id})">+</button>

</div>

</div>

</div>

`

})

document.getElementById("produk").innerHTML=html
updateCart()

}

renderProduk(produk)

/* SEARCH */

function filterProduk(){

let key=document.getElementById("searchInput").value.toLowerCase()

let hasil=produk.filter(p=>p.nama.toLowerCase().includes(key))

renderProduk(hasil)

}

/* KATEGORI */

function filterKategori(k){

if(k=="all"){renderProduk(produk);return}

let hasil=produk.filter(p=>p.kategori==k)

renderProduk(hasil)

}

/* QTY */

function plus(id){

cart[id]=(cart[id]||0)+1

document.querySelector(".cartBtn").classList.add("shake")

setTimeout(()=>{

document.querySelector(".cartBtn").classList.remove("shake")

},400)

save()

}

function minus(id){

if(cart[id]>0)cart[id]--

save()

}

function removeItem(id){

delete cart[id]

save()

}

function save(){

localStorage.setItem("cart",JSON.stringify(cart))

renderProduk(produk)

}

/* UPDATE CART */

function updateCart(){

let html=""
let total=0
let jumlah=0

produk.forEach(p=>{

let q=cart[p.id]||0

if(q>0){

let sub=q*p.harga

jumlah+=q
total+=sub

html+=`

<div class="cartItem">

<img src="${p.img}">

<div>

<b>${p.nama}</b>

<br>

${q} x ${rupiah(p.harga)}

<br>

<button onclick="removeItem(${p.id})">Hapus</button>

</div>

</div>

`

}

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("cartCount").innerText=jumlah
document.getElementById("totalHarga").innerText="Total : "+rupiah(total)

}

/* CART */

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active")
}

/* POPUP */

function detailProduk(id){

let p=produk.find(x=>x.id==id)

currentProduk=id

document.getElementById("popup").style.display="flex"
document.getElementById("popupImg").src=p.img
document.getElementById("popupNama").innerText=p.nama
document.getElementById("popupHarga").innerText=rupiah(p.harga)

}

function tambahPopup(){

cart[currentProduk]=(cart[currentProduk]||0)+1

save()

closePopup()

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

/* CHECKOUT */

function checkout(){

let pesan="Halo saya ingin memesan:%0A%0A"

let total=0

produk.forEach(p=>{

let q=cart[p.id]||0

if(q>0){

let sub=q*p.harga

pesan+=p.nama+" x "+q+" = "+rupiah(sub)+"%0A"

total+=sub

}

})

pesan+="%0ATotal : "+rupiah(total)

window.open("https://wa.me/6281220549530?text="+pesan)

}

/* SLIDER */

let slider=document.getElementById("slider")
let dots=document.querySelectorAll(".dot")

let index=0
let totalSlide=3

function showSlide(){

slider.style.transform="translateX(-"+index*100+"%)"

dots.forEach(d=>d.classList.remove("active"))

dots[index].classList.add("active")

}

function nextSlide(){

index++

if(index>=totalSlide)index=0

showSlide()

}

setInterval(nextSlide,3000)

/* SWIPE */

let startX=0

slider.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX
})

slider.addEventListener("touchend",(e)=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50){
index++
if(index>=totalSlide)index=0
}

if(endX-startX>50){
index--
if(index<0)index=totalSlide-1
}

showSlide()

})

</script>

</body>
</html>
