<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUANDY BUTIK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

header{
background:black;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
z-index:1000;
}

.cart{
position:absolute;
right:15px;
top:10px;
background:#00c853;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

/* BANNER */

.banner{
background: linear-gradient(135deg,#6a11cb,#2575fc);
padding:60px 20px;
text-align:center;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.banner button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
font-weight:bold;
cursor:pointer;
}

/* SEARCH */

.search{
padding:20px;
text-align:center;
}

.search input{
width:90%;
padding:12px;
border-radius:10px;
border:none;
}

/* PRODUK */

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#1a1a1a;
border-radius:15px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#00e676;
font-weight:bold;
margin:8px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

/* CHECKOUT BUTTON */

.checkout{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#00c853;
padding:15px 30px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

/* CART POPUP */

#cartBox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
z-index:2000;
padding:20px;
overflow:auto;
}

#cartBox h2{
text-align:center;
}

.item{
background:#222;
padding:10px;
margin:10px 0;
border-radius:10px;
}

.remove{
background:red;
margin-top:5px;
}

footer{
text-align:center;
padding:20px;
color:#888;
}

</style>
</head>

<body>

<header>
JUANDY BUTIK
<div class="cart" onclick="openCart()">🛒 <span id="cartCount">0</span></div>
</header>

<div class="banner">
<p>Fashion Trend • Harga Terbaik • Kualitas Premium</p>
<button onclick="scrollProduk()">Belanja Sekarang</button>
</div>

<div class="search">
<input type="text" id="search" placeholder="Cari produk..." onkeyup="searchProduk()">
</div>

<div class="container" id="produk">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Baju Fashion</h3>
<div class="price">Rp120000</div>
<button onclick="addCart('Baju Fashion',120000)">Tambah</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
<h3>Tas Wanita</h3>
<div class="price">Rp150000</div>
<button onclick="addCart('Tas Wanita',150000)">Tambah</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Sepatu Trend</h3>
<div class="price">Rp200000</div>
<button onclick="addCart('Sepatu Trend',200000)">Tambah</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551028719-00167b16eac5">
<h3>Jaket Pria</h3>
<div class="price">Rp250000</div>
<button onclick="addCart('Jaket Pria',250000)">Tambah</button>
</div>

</div>

<div class="checkout" onclick="checkout()">Checkout WhatsApp</div>

<footer>
© 2026 JUANDY BUTIK
</footer>

<!-- CART POPUP -->

<div id="cartBox">

<h2>Keranjang Belanja</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

<button onclick="checkout()">Checkout WhatsApp</button>
<button onclick="closeCart()">Tutup</button>

</div>

<script>

let cart=[]

function addCart(nama,harga){

cart.push({nama,harga})

updateCart()

}

function updateCart(){

document.getElementById("cartCount").innerText=cart.length

}

function openCart(){

let items=document.getElementById("cartItems")

items.innerHTML=""

let total=0

cart.forEach((item,index)=>{

items.innerHTML+=`
<div class="item">
${item.nama} - Rp${item.harga}
<button class="remove" onclick="removeItem(${index})">Hapus</button>
</div>
`

total+=item.harga

})

document.getElementById("total").innerText="Total: Rp"+total

document.getElementById("cartBox").style.display="block"

}

function closeCart(){

document.getElementById("cartBox").style.display="none"

}

function removeItem(i){

cart.splice(i,1)

updateCart()

openCart()

}

function checkout(){

if(cart.length==0){
alert("Keranjang kosong")
return
}

let pesan="Halo saya ingin membeli:%0A"

let total=0

cart.forEach(item=>{
pesan+=item.nama+" - Rp"+item.harga+"%0A"
total+=item.harga
})

pesan+="%0ATotal: Rp"+total

window.open("https://wa.me/6281220549530?text="+pesan)

}

function searchProduk(){

let input=document.getElementById("search").value.toLowerCase()

let card=document.getElementsByClassName("card")

for(let i=0;i<card.length;i++){

let text=card[i].innerText.toLowerCase()

if(text.includes(input)){
card[i].style.display="block"
}else{
card[i].style.display="none"
}

}

}

function scrollProduk(){
document.getElementById("produk").scrollIntoView({behavior:"smooth"})
}

</script>

</body>
</html>
