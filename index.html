<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JUANDY BUTIK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
position:sticky;
top:0;
z-index:999;
}

.cart{
position:fixed;
right:15px;
top:15px;
background:#00c853;
padding:10px 15px;
border-radius:20px;
font-weight:bold;
}

.banner{
padding:40px;
text-align:center;
font-size:22px;
background:linear-gradient(45deg,#ff006a,#7a00ff);
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:80%;
padding:12px;
border-radius:10px;
border:none;
}

.container{
padding:20px;
}

.card{
background:#151515;
padding:15px;
border-radius:15px;
margin-bottom:25px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#00e676;
font-size:20px;
margin:10px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
color:#aaa;
}

.chat{
position:fixed;
bottom:20px;
right:20px;
background:#00c853;
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
}

</style>
</head>

<body>

<header>
JUANDY BUTIK
</header>

<div class="cart">
🛒 Cart: <span id="cart">0</span>
</div>

<div class="banner">
🔥 Promo Fashion Terbaru 🔥
</div>

<div class="search">
<input type="text" id="search" placeholder="Cari produk..." onkeyup="cariProduk()">
</div>

<div class="container" id="produk">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h2>Baju Fashion</h2>
<div class="price">Rp120.000</div>

<button onclick="tambah()">Tambah</button>
<button onclick="beli('Baju Fashion','120000')">Beli</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
<h2>Tas Wanita</h2>
<div class="price">Rp150.000</div>

<button onclick="tambah()">Tambah</button>
<button onclick="beli('Tas Wanita','150000')">Beli</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h2>Sepatu Trend</h2>
<div class="price">Rp200.000</div>

<button onclick="tambah()">Tambah</button>
<button onclick="beli('Sepatu Trend','200000')">Beli</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551028719-00167b16eac5">
<h2>Jaket Pria</h2>
<div class="price">Rp250.000</div>

<button onclick="tambah()">Tambah</button>
<button onclick="beli('Jaket Pria','250000')">Beli</button>
</div>

</div>

<footer>
© 2026 JUANDY BUTIK
</footer>

<a class="chat"
href="https://wa.me/6281220549530"
target="_blank">💬</a>

<script>

let cart=0;

function tambah(){

cart++;

document.getElementById("cart").innerText=cart;

alert("Produk ditambahkan ke keranjang");

}

function beli(nama,harga){

let pesan="Halo saya ingin membeli:%0A%0A"+
"Produk: "+nama+"%0A"+
"Harga: Rp"+harga+"%0A%0A"+
"Link toko:%0A"+
window.location.href;

window.open(
"https://wa.me/6281220549530?text="+pesan,
"_blank"
);

}

function cariProduk(){

let input=document.getElementById("search").value.toLowerCase();

let card=document.getElementsByClassName("card");

for(let i=0;i<card.length;i++){

let text=card[i].innerText.toLowerCase();

if(text.includes(input)){

card[i].style.display="block";

}else{

card[i].style.display="none";

}

}

}

</script>

</body>
</html>
