<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUANDY BUTIK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0e0e0e;
color:white;
}

header{
background:#000;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
font-size:18px;
}

.cart{
cursor:pointer;
}

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.nama{
font-size:16px;
font-weight:bold;
margin-top:10px;
}

.harga{
color:#ccc;
margin-bottom:10px;
}

.btn{
background:#00c853;
border:none;
padding:8px 15px;
color:white;
border-radius:6px;
margin-bottom:10px;
cursor:pointer;
}

.btn:hover{
background:#00b44a;
}

.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.wa img{
width:32px;
}

</style>
</head>

<body>

<header>

JUANDY BUTIK

<div class="cart">
🛒 <span id="jumlah">0</span>
</div>

</header>

<div class="container" id="produk"></div>

<a class="wa" onclick="checkout()">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>

let produk=[

{
nama:"Baju Fashion",
harga:120000,
img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600"
},

{
nama:"Tas Wanita",
harga:150000,
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=600"
},

{
nama:"Sepatu Trend",
harga:200000,
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600"
},

{
nama:"Jaket Pria",
harga:250000,
img:"https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=600"
}

]

let cart=[]

function tampilProduk(){

let html=""

produk.forEach((p,i)=>{

html+=`
<div class="card">

<img src="${p.img}">

<div class="nama">${p.nama}</div>

<div class="harga">Rp ${p.harga}</div>

<button class="btn" onclick="tambah(${i})">Tambah</button>

</div>
`

})

document.getElementById("produk").innerHTML=html

}

function tambah(i){

cart.push(produk[i])

document.getElementById("jumlah").innerText=cart.length

}

function checkout(){

if(cart.length==0){

alert("Keranjang masih kosong")

return

}

let pesan="Halo saya ingin pesan:%0A"

cart.forEach(p=>{

pesan+=p.nama+" - Rp "+p.harga+"%0A"

})

window.open("https://wa.me/?text="+pesan)

}

tampilProduk()

</script>

</body>
</html>
