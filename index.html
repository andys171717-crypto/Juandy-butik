<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUANDY BUTIK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:black;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#1c1c1c;
border-radius:10px;
overflow:hidden;
text-align:center;
padding-bottom:10px;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.nama{
margin-top:10px;
font-weight:bold;
}

.harga{
color:#ccc;
font-size:14px;
margin-bottom:5px;
}

button{
background:#00c853;
border:none;
padding:8px 12px;
color:white;
border-radius:5px;
}

button:hover{
opacity:0.8;
}

.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:55px;
height:55px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:white;
text-decoration:none;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#1c1c1c;
padding:20px;
border-radius:10px;
width:90%;
max-width:350px;
}

.checkout{
background:#00c853;
width:100%;
padding:10px;
margin-top:10px;
}

</style>
</head>

<body>

<header>
JUANDY BUTIK
<div onclick="bukaCart()" style="cursor:pointer">🛒 <span id="jumlah">0</span></div>
</header>

<div class="container" id="produk"></div>

<a class="wa" href="#" onclick="checkout()">📱</a>

<div class="modal" id="cartModal">
<div class="modal-box">
<h3>Keranjang</h3>
<div id="isiCart"></div>
<button class="checkout" onclick="checkout()">Checkout WhatsApp</button>
</div>
</div>

<script>

let produk=[
{
nama:"Baju Fashion",
harga:120000,
img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500"
},
{
nama:"Tas Wanita",
harga:150000,
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500"
},
{
nama:"Sepatu Trend",
harga:200000,
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500"
},
{
nama:"Jaket Pria",
harga:250000,
img:"https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500"
}
]

let cart=[]

function tampilProduk(){

let html=""

produk.forEach((p,i)=>{

html+=`
<div class="card">
<img src="${p.img}">
<div class="nama">${p.nama}</div>
<div class="harga">Rp ${p.harga}</div>
<button onclick="tambah(${i})">Tambah</button>
</div>
`

})

document.getElementById("produk").innerHTML=html

}

function tambah(i){

cart.push(produk[i])
updateCart()

}

function updateCart(){

document.getElementById("jumlah").innerText=cart.length

let html=""

cart.forEach(p=>{
html+=`<div>${p.nama} - Rp ${p.harga}</div>`
})

document.getElementById("isiCart").innerHTML=html

}

function bukaCart(){
document.getElementById("cartModal").style.display="flex"
}

function checkout(){

if(cart.length==0){
alert("Keranjang kosong")
return
}

let text="Halo saya ingin pesan:%0A"

cart.forEach(p=>{
text+=p.nama+" - Rp "+p.harga+"%0A"
})

window.open("https://wa.me/?text="+text)

}

tampilProduk()

</script>

</body>
</html>
