<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JUANDY BUTIK</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
padding:15px;
}

.logo{
font-size:18px;
font-weight:bold;
}

.cart{
cursor:pointer;
display:flex;
align-items:center;
gap:5px;
}

.cart span{
background:#25D366;
padding:3px 8px;
border-radius:20px;
font-size:12px;
}

/* PRODUK */

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#1c1c1c;
border-radius:15px;
overflow:hidden;
text-align:center;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.nama{
margin-top:10px;
font-weight:bold;
}

.harga{
color:#ccc;
margin-bottom:10px;
}

.btn{
background:#00c853;
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
cursor:pointer;
margin-bottom:15px;
}

/* CART */

.cartBox{
position:fixed;
top:0;
right:-100%;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:0.4s;
overflow:auto;
}

.cartBox.active{
right:0;
}

.cartItem{
border-bottom:1px solid #333;
padding:12px 0;
}

.qty{
display:flex;
gap:10px;
margin-top:5px;
}

.qty button{
background:#00c853;
border:none;
padding:5px 10px;
border-radius:5px;
color:white;
}

.total{
margin-top:15px;
font-weight:bold;
}

/* BUTTON */

.checkout{
background:#25D366;
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
color:white;
font-weight:bold;
}

.back{
background:#333;
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
color:white;
}

/* WA */

.wa{
position:fixed;
bottom:90px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
cursor:pointer;
}

/* FOOTER */

footer{
background:#000;
text-align:center;
padding:20px;
margin-top:40px;
color:#aaa;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
JUANDY BUTIK
</div>

<div class="cart" onclick="toggleCart()">

<i class="fa-solid fa-cart-shopping"></i>

<span id="cartCount">0</span>

</div>

</div>

<div class="container" id="produk"></div>

<!-- CART -->

<div class="cartBox" id="cartBox">

<h3>Keranjang</h3>

<div id="cartItems"></div>

<div class="total">
Total: Rp <span id="totalHarga">0</span>
</div>

<button class="checkout" onclick="checkout()">
Checkout WhatsApp
</button>

<button class="back" onclick="toggleCart()">
Kembali Belanja
</button>

</div>

<!-- WA -->

<div class="wa" onclick="waDirect()">
<i class="fa-brands fa-whatsapp"></i>
</div>

<footer>

© 2026 JUANDY BUTIK  
Belanja mudah langsung WhatsApp

</footer>

<script>

/* DATA PRODUK */

const produk=[

{ id:1, nama:"Baju Fashion", harga:120000,
img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" },

{ id:2, nama:"Tas Wanita", harga:150000,
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3" },

{ id:3, nama:"Sepatu Trend", harga:200000,
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff" },

{ id:4, nama:"Jaket Pria", harga:250000,
img:"https://images.unsplash.com/photo-1548883354-7622d03aca27" }

]

/* CART */

let cart = JSON.parse(localStorage.getItem("cart")) || []

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart))
}

/* PRODUK */

function tampilProduk(){

let html=""

produk.forEach(p=>{

html+=`

<div class="card">

<img src="${p.img}">

<div class="nama">${p.nama}</div>

<div class="harga">Rp ${p.harga}</div>

<button class="btn" onclick="tambah(${p.id})">
Tambah
</button>

</div>

`

})

document.getElementById("produk").innerHTML=html

}

/* TAMBAH */

function tambah(id){

let item=cart.find(x=>x.id===id)

if(item){

item.qty++

}else{

let p=produk.find(x=>x.id===id)

cart.push({
id:p.id,
nama:p.nama,
harga:p.harga,
qty:1
})

}

saveCart()
updateCart()

}

/* MINUS */

function minus(id){

let item=cart.find(x=>x.id===id)

if(!item) return

item.qty--

if(item.qty<=0){

cart=cart.filter(x=>x.id!==id)

}

saveCart()
updateCart()

}

/* PLUS */

function plus(id){

let item=cart.find(x=>x.id===id)

if(!item) return

item.qty++

saveCart()
updateCart()

}

/* UPDATE */

function updateCart(){

let html=""
let total=0
let jumlah=0

cart.forEach(item=>{

let subtotal=item.harga*item.qty

total+=subtotal
jumlah+=item.qty

html+=`

<div class="cartItem">

${item.nama}<br>

Rp ${item.harga} x ${item.qty}

<div class="qty">

<button onclick="minus(${item.id})">-</button>

<span>${item.qty}</span>

<button onclick="plus(${item.id})">+</button>

</div>

</div>

`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("totalHarga").innerText=total
document.getElementById("cartCount").innerText=jumlah

}

/* CART */

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active")
}

/* CHECKOUT */

function checkout(){

if(cart.length==0){

alert("Keranjang kosong")
return

}

let pesan="Halo saya ingin memesan:%0A%0A"

cart.forEach(item=>{
pesan+=item.nama+" x "+item.qty+" = Rp "+(item.harga*item.qty)+"%0A"
})

window.open("https://wa.me/6281220549530?text="+pesan)

}

/* WA */

function waDirect(){
window.open("https://wa.me/6281220549530")
}

tampilProduk()
updateCart()

</script>

</body>
</html>
