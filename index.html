<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUANDY BUTIK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
}

.cart{
position:absolute;
right:15px;
top:10px;
background:#00c853;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#1a1a1a;
border-radius:15px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#00e676;
font-weight:bold;
margin:8px;
}

.qty{
font-size:13px;
color:#aaa;
margin-top:5px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

#cartBox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
padding:20px;
overflow:auto;
}

.item{
background:#222;
padding:10px;
margin:10px 0;
border-radius:10px;
}

</style>
</head>

<body>

<header>
JUANDY BUTIK
<div class="cart" onclick="openCart()">🛒 <span id="cartCount">0</span></div>
</header>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Baju Fashion</h3>
<div class="price">Rp120000</div>
<button onclick="addCart('Baju Fashion',120000,'q1')">Tambah</button>
<div class="qty" id="q1">0 pcs</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
<h3>Tas Wanita</h3>
<div class="price">Rp150000</div>
<button onclick="addCart('Tas Wanita',150000,'q2')">Tambah</button>
<div class="qty" id="q2">0 pcs</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Sepatu Trend</h3>
<div class="price">Rp200000</div>
<button onclick="addCart('Sepatu Trend',200000,'q3')">Tambah</button>
<div class="qty" id="q3">0 pcs</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551028719-00167b16eac5">
<h3>Jaket Pria</h3>
<div class="price">Rp250000</div>
<button onclick="addCart('Jaket Pria',250000,'q4')">Tambah</button>
<div class="qty" id="q4">0 pcs</div>
</div>

</div>

<div id="cartBox">

<h2>Keranjang Belanja</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

<button onclick="checkout()">Checkout WhatsApp</button>
<button onclick="closeCart()">Tutup</button>

</div>

<script>

let cart={}
let totalItem=0

function addCart(nama,harga,id){

if(!cart[nama]){
cart[nama]={harga:harga,qty:0}
}

cart[nama].qty++

totalItem++

document.getElementById("cartCount").innerText=totalItem

document.getElementById(id).innerText=cart[nama].qty+" pcs"

}

function openCart(){

let items=document.getElementById("cartItems")

items.innerHTML=""

let total=0

for(let nama in cart){

let item=cart[nama]

let subtotal=item.qty*item.harga

items.innerHTML+=`
<div class="item">
${nama} (${item.qty} pcs) - Rp${subtotal}
</div>
`

total+=subtotal

}

document.getElementById("total").innerText="Total: Rp"+total

document.getElementById("cartBox").style.display="block"

}

function closeCart(){
document.getElementById("cartBox").style.display="none"
}

function checkout(){

let pesan="Halo saya ingin membeli:%0A"

let total=0

for(let nama in cart){

let item=cart[nama]

let subtotal=item.qty*item.harga

pesan+=nama+" ("+item.qty+" pcs) - Rp"+subtotal+"%0A"

total+=subtotal

}

pesan+="%0ATotal: Rp"+total

window.open("https://wa.me/6281220549530?text="+pesan)

}

</script>

</body>
</html>
