<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JUANDY BUTIK</title>

<style>

body{
background:#000;
font-family:Arial;
margin:0;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.cart{
position:fixed;
right:15px;
top:15px;
background:#00c853;
padding:10px 15px;
border-radius:10px;
}

.banner{
background:linear-gradient(45deg,#ff0066,#7b00ff);
padding:40px;
text-align:center;
font-size:22px;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:90%;
padding:12px;
border-radius:10px;
border:none;
}

.container{
padding:20px;
}

.card{
background:#111;
border-radius:15px;
margin-bottom:25px;
padding:15px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#00e676;
font-size:20px;
margin:10px 0;
}

.btn{
background:#00c853;
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
font-size:16px;
margin:5px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
color:#aaa;
}

</style>

</head>
<body>

<header>
JUANDY BUTIK
</header>

<div class="cart">
🛒 Cart: <span id="cart">0</span>
</div>

<div class="banner">
🔥 Promo Fashion Terbaru 🔥
</div>

<div class="search">
<input type="text" id="search" placeholder="Cari produk...">
</div>

<div class="container" id="products">

<!-- BAJU -->
<div class="card">
<img src="https://images.unsplash.com/photo-1520975922284-1f1c2f2c4e9c">
<h2>Baju Fashion</h2>
<div class="price">Rp120.000</div>

<button class="btn" onclick="tambahCart()">Tambah</button>

<button class="btn"
onclick="beliProduk('Baju Fashion','120000')">
Beli
</button>
</div>

<!-- TAS -->
<div class="card">
<img src="https://images.unsplash.com/photo-1591561954557-26941169b49e">
<h2>Tas Wanita</h2>
<div class="price">Rp150.000</div>

<button class="btn" onclick="tambahCart()">Tambah</button>

<button class="btn"
onclick="beliProduk('Tas Wanita','150000')">
Beli
</button>
</div>

<!-- SEPATU -->
<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h2>Sepatu Trend</h2>
<div class="price">Rp200.000</div>

<button class="btn" onclick="tambahCart()">Tambah</button>

<button class="btn"
onclick="beliProduk('Sepatu Trend','200000')">
Beli
</button>
</div>

<!-- JAKET -->
<div class="card">
<img src="https://images.unsplash.com/photo-1593032465171-8c1c5d9b8e7e">
<h2>Jaket Pria</h2>
<div class="price">Rp250.000</div>

<button class="btn" onclick="tambahCart()">Tambah</button>

<button class="btn"
onclick="beliProduk('Jaket Pria','250000')">
Beli
</button>
</div>

</div>

<footer>
© 2026 JUANDY BUTIK
</footer>

<script>

let cart=0

function tambahCart(){
cart++
document.getElementById("cart").innerText=cart
}

function beliProduk(nama,harga){

let pesan="Halo saya ingin membeli:%0A%0A"+
"Produk: "+nama+"%0A"+
"Harga: Rp"+harga+"%0A%0A"+
"Link Toko:%0A"+
window.location.href

window.open(
"https://wa.me/6281220549530?text="+pesan
)

}

</script>

</body>
</html>
