<!DOCTYPE html>
<html>
<head>
<title>JUANDY BUTIK</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

header{
background:black;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.product{
background:#1e1e1e;
border-radius:10px;
width:200px;
margin:10px;
padding:10px;
text-align:center;
}

.product img{
width:100%;
border-radius:10px;
}

.price{
color:#00ff99;
font-size:18px;
margin:10px 0;
}

button{
background:#00cc66;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#00ff88;
}
</style>

</head>

<body>

<header>
JUANDY BUTIK
</header>

<div class="container">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Baju Fashion</h3>
<div class="price">Rp120.000</div>
<button onclick="order('Baju Fashion')">Beli</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Tas Wanita</h3>
<div class="price">Rp150.000</div>
<button onclick="order('Tas Wanita')">Beli</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Sepatu Trend</h3>
<div class="price">Rp200.000</div>
<button onclick="order('Sepatu Trend')">Beli</button>
</div>

</div>

<script>
function order(product){
let nomor="628123456789"; 
let pesan="Halo saya mau beli "+product;
window.open("https://wa.me/"+nomor+"?text="+encodeURIComponent(pesan));
}
</script>

</body>
</html>
