<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JUANDY BUTIK</title>

<style>

body{
font-family:Arial;
margin:0;
background:black;
color:white;
padding-bottom:120px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
}

.logout{
background:#00c853;
padding:8px 15px;
border-radius:10px;
border:none;
color:white;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:#1a1a1a;
border-radius:15px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
}

.price{
margin:8px 0;
color:#ccc;
}

.btn{
background:#00c853;
border:none;
padding:10px;
border-radius:10px;
color:white;
width:80%;
}

.login{
max-width:320px;
margin:120px auto;
text-align:center;
}

.login input{
width:90%;
padding:10px;
margin:10px;
border-radius:10px;
border:none;
}

.login button{
background:#00c853;
border:none;
padding:10px;
border-radius:10px;
color:white;
width:100px;
}

.cartPage{
padding:15px;
}

.cartItem{
background:#1a1a1a;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.total{
text-align:center;
font-size:24px;
margin-top:20px;
color:#00e676;
}

.checkout{
background:#00c853;
border:none;
padding:12px;
border-radius:10px;
width:200px;
color:white;
}

.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px 20px;
border-radius:30px;
font-weight:bold;
}

</style>

</head>

<body>

<div id="loginPage" class="login">

<h2>Login JUANDY BUTIK</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

<p onclick="register()">Daftar akun</p>
<p onclick="lupa()">Lupa password</p>

</div>


<div id="shop" style="display:none">

<div class="header">

<b>JUANDY BUTIK</b>

<div>
Hi <span id="user"></span>
🛒 <span id="cartCount">0</span>

<button class="logout" onclick="logout()">Logout</button>
</div>

</div>

<div id="produk" class="grid"></div>

</div>


<div id="cartPage" style="display:none" class="cartPage">

<div class="header">

<h3>Keranjang Belanja</h3>

<button class="logout" onclick="kembali()">Kembali</button>

</div>

<div id="cartList"></div>

<div class="total" id="total"></div>

<center>
<button class="checkout" onclick="checkout()">Checkout WhatsApp</button>
</center>

</div>


<a href="https://wa.me/6281234567890" class="wa">Chat WhatsApp</a>


<script>

let produk=[

{name:"Baju Fashion",harga:120000,img:"https://images.unsplash.com/photo-1520975922284-8b456906c813",pcs:0},

{name:"Tas Wanita",harga:150000,img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3",pcs:0},

{name:"Sepatu Trend",harga:200000,img:"https://images.unsplash.com/photo-1528701800489-20be3c68dfd8",pcs:0},

{name:"Jaket Pria",harga:250000,img:"https://images.unsplash.com/photo-1520974735194-9c7e70c4b6f7",pcs:0}

]

function tampilProduk(){

let html=""

produk.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">Rp${p.harga}</div>

<button class="btn" onclick="tambah(${i})">Tambah</button>

<p>${p.pcs} pcs</p>

</div>

`

})

document.getElementById("produk").innerHTML=html

updateCart()

}

function tambah(i){

produk[i].pcs++

tampilProduk()

}

function updateCart(){

let total=0

produk.forEach(p=>{

total+=p.pcs

})

document.getElementById("cartCount").innerText=total

}

document.addEventListener("click",function(e){

if(e.target.innerText=="🛒"){

bukaCart()

}

})

function bukaCart(){

document.getElementById("shop").style.display="none"
document.getElementById("cartPage").style.display="block"

let html=""
let total=0

produk.forEach(p=>{

if(p.pcs>0){

let harga=p.pcs*p.harga

total+=harga

html+=`

<div class="cartItem">

<h3>${p.name}</h3>

<p>${p.pcs} pcs</p>

<p>Rp ${harga}</p>

</div>

`

}

})

document.getElementById("cartList").innerHTML=html
document.getElementById("total").innerText="Total Rp "+total

}

function kembali(){

document.getElementById("cartPage").style.display="none"
document.getElementById("shop").style.display="block"

}

function checkout(){

let pesan="Halo saya ingin pesan:%0A"

let total=0

produk.forEach(p=>{

if(p.pcs>0){

let harga=p.pcs*p.harga

total+=harga

pesan+=p.name+" "+p.pcs+" pcs - Rp"+harga+"%0A"

}

})

pesan+="Total Rp "+total

window.open("https://wa.me/6281234567890?text="+pesan)

}

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

let data=JSON.parse(localStorage.getItem("user"))

if(!data){

alert("Silakan daftar dulu")

return

}

if(u==data.username && p==data.password){

localStorage.setItem("login","true")

document.getElementById("loginPage").style.display="none"
document.getElementById("shop").style.display="block"

document.getElementById("user").innerText=u

tampilProduk()

}else{

alert("Login salah")

}

}

function register(){

let u=prompt("Buat username")
let p=prompt("Buat password")
let q=prompt("Pertanyaan keamanan")
let a=prompt("Jawaban")

localStorage.setItem("user",JSON.stringify({
username:u,
password:p,
q:q,
a:a
}))

alert("Akun berhasil dibuat")

}

function lupa(){

let data=JSON.parse(localStorage.getItem("user"))

let j=prompt(data.q)

if(j==data.a){

alert("Password kamu: "+data.password)

}else{

alert("Jawaban salah")

}

}

function logout(){

localStorage.removeItem("login")

location.reload()

}

</script>

</body>
</html>
