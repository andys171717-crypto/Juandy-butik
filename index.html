<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JUANDY BUTIK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

.header{
position:sticky;
top:0;
z-index:1000;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:black;
}

.logo{
font-size:20px;
font-weight:bold;
}

.cartBtn{
position:relative;
background:#25D366;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
}

.cartCount{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
font-size:12px;
padding:2px 6px;
border-radius:50%;
}

/* SEARCH */

.search{
padding:10px;
background:#111;
}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
}

/* BANNER */

.banner img{
width:100%;
height:160px;
object-fit:cover;
}

/* FILTER */

.filter{
display:flex;
gap:10px;
padding:10px;
}

.filter button{
background:#222;
border:none;
color:white;
padding:6px 12px;
border-radius:20px;
}

/* PRODUK */

.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:#1c1c1c;
border-radius:15px;
overflow:hidden;
text-align:center;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
cursor:pointer;
}

.nama{
font-weight:bold;
margin-top:8px;
}

.harga{
color:#ccc;
margin-bottom:8px;
}

.qty{
display:flex;
justify-content:center;
gap:8px;
margin-bottom:10px;
}

.qty button{
background:#00c853;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
}

.qty input{
width:50px;
text-align:center;
border:none;
border-radius:6px;
}

/* CART */

.cartBox{
position:fixed;
top:0;
right:-100%;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:0.4s;
overflow:auto;
z-index:2000;
}

.cartBox.active{
right:0;
}

.checkout{
background:#25D366;
border:none;
padding:12px;
width:100%;
border-radius:8px;
margin-top:10px;
color:white;
font-weight:bold;
}

.closeCart{
background:#333;
border:none;
padding:12px;
width:100%;
border-radius:8px;
margin-top:10px;
color:white;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:3000;
}

.popupContent{
background:#222;
padding:20px;
border-radius:10px;
width:80%;
max-width:300px;
text-align:center;
}

.popupContent img{
width:100%;
border-radius:10px;
}

/* WA */

.wa{
position:fixed;
bottom:90px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
}

footer{
text-align:center;
padding:20px;
color:#aaa;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">JUANDY BUTIK</div>

<div class="cartBtn" onclick="toggleCart()">
<i class="fa-solid fa-cart-shopping"></i>
<div class="cartCount" id="cartCount">0</div>
</div>

</div>

<div class="search">
<input type="text" placeholder="Cari produk..." onkeyup="searchProduk(this.value)">
</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1445205170230-053b83016050">
</div>

<div class="filter">
<button onclick="filterProduk('all')">Semua</button>
<button onclick="filterProduk('baju')">Baju</button>
<button onclick="filterProduk('tas')">Tas</button>
<button onclick="filterProduk('sepatu')">Sepatu</button>
</div>

<div class="container" id="produk"></div>

<!-- CART -->

<div class="cartBox" id="cartBox">

<h2>Keranjang</h2>

<div id="cartItems"></div>

<h3 id="totalHarga">Total : Rp 0</h3>

<button class="checkout" onclick="checkout()">Checkout WhatsApp</button>

<button class="closeCart" onclick="toggleCart()">Tutup</button>

</div>

<!-- POPUP -->

<div class="popup" id="popup">
<div class="popupContent">

<img id="popupImg">

<h3 id="popupNama"></h3>

<p id="popupHarga"></p>

<button onclick="closePopup()">Tutup</button>

</div>
</div>

<div class="wa" onclick="checkout()">
<i class="fa-brands fa-whatsapp"></i>
</div>

<footer>
© 2026 JUANDY BUTIK
</footer>

<script>

function rupiah(n){
return "Rp "+n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".")
}

let produk=[
{id:1,nama:"Baju Fashion",harga:120000,kategori:"baju",img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
{id:2,nama:"Tas Wanita",harga:150000,kategori:"tas",img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"},
{id:3,nama:"Sepatu Trend",harga:200000,kategori:"sepatu",img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{id:4,nama:"Jaket Pria",harga:250000,kategori:"baju",img:"https://images.unsplash.com/photo-1548883354-7622d03aca27"}
]

let cart=JSON.parse(localStorage.getItem("cart"))||{}

function tampilProduk(data){

let html=""

data.forEach(p=>{

let qty=cart[p.id]||0

html+=`

<div class="card">

<img src="${p.img}" onclick="detailProduk(${p.id})">

<div class="nama">${p.nama}</div>

<div class="harga">${rupiah(p.harga)}</div>

<div class="qty">

<button onclick="minus(${p.id})">-</button>

<input value="${qty}" onchange="ubahQty(${p.id},this.value)">

<button onclick="plus(${p.id})">+</button>

</div>

</div>

`

})

document.getElementById("produk").innerHTML=html
updateCart()

}

tampilProduk(produk)

function plus(id){
cart[id]=(cart[id]||0)+1
save()
}

function minus(id){
if(cart[id]>0) cart[id]--
save()
}

function ubahQty(id,v){
cart[id]=parseInt(v)||0
save()
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart))
tampilProduk(produk)
}

function updateCart(){

let html=""
let total=0
let jumlah=0

produk.forEach(p=>{

let q=cart[p.id]||0

if(q>0){

let sub=q*p.harga

jumlah+=q
total+=sub

html+=p.nama+" x "+q+" = "+rupiah(sub)+"<br><br>"

}

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("totalHarga").innerText="Total : "+rupiah(total)
document.getElementById("cartCount").innerText=jumlah

}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active")
}

function checkout(){

let pesan="Halo saya ingin memesan:%0A%0A"
let total=0

produk.forEach(p=>{

let q=cart[p.id]||0

if(q>0){

let sub=q*p.harga

pesan+=p.nama+" x "+q+" = "+rupiah(sub)+"%0A"

total+=sub

}

})

pesan+="%0ATotal : "+rupiah(total)

window.open("https://wa.me/6281220549530?text="+pesan)

}

function searchProduk(k){

k=k.toLowerCase()

let hasil=produk.filter(p=>p.nama.toLowerCase().includes(k))

tampilProduk(hasil)

}

function filterProduk(k){

if(k=="all") tampilProduk(produk)

else tampilProduk(produk.filter(p=>p.kategori==k))

}

/* POPUP */

function detailProduk(id){

let p=produk.find(x=>x.id==id)

document.getElementById("popup").style.display="flex"

document.getElementById("popupImg").src=p.img
document.getElementById("popupNama").innerText=p.nama
document.getElementById("popupHarga").innerText=rupiah(p.harga)

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
