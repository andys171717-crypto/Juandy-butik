<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JUANDY BUTIK</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:black;
position:sticky;
top:0;
}

.logo{
font-size:20px;
font-weight:bold;
}

.cartBtn{
background:#25D366;
padding:10px 14px;
border-radius:20px;
position:relative;
}

.cartCount{
position:absolute;
top:-5px;
right:-5px;
background:red;
padding:2px 6px;
font-size:12px;
border-radius:50%;
}

/* SEARCH */

.search{
padding:10px;
background:#111;
}

.search input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
}

/* BANNER */

.banner img{
width:100%;
height:180px;
object-fit:cover;
}

/* KATEGORI */

.kategori{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:#111;
}

.katBtn{
background:#1a1a1a;
border:none;
color:white;
padding:8px 14px;
border-radius:20px;
}

/* PRODUK */

.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:#1a1a1a;
border-radius:14px;
overflow:hidden;
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.nama{
padding:8px;
}

.harga{
padding:0 8px;
color:#00e676;
font-weight:bold;
}

.rating{
padding:0 8px 8px;
color:#ffc107;
}

/* WA */

.waFloat{
position:fixed;
bottom:80px;
right:20px;
width:55px;
height:55px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #333;
}

.menu{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">JUANDY BUTIK</div>

<div class="cartBtn">
<i class="fa-solid fa-cart-shopping"></i>
<div class="cartCount">0</div>
</div>

</div>

<!-- SEARCH -->

<div class="search">
<input type="text" placeholder="Cari produk..." onkeyup="searchProduk(this.value)">
</div>

<!-- BANNER -->

<div class="banner">
<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b">
</div>

<!-- KATEGORI -->

<div class="kategori">

<button class="katBtn" onclick="filterKategori('semua')">Semua</button>
<button class="katBtn" onclick="filterKategori('baju')">Baju</button>
<button class="katBtn" onclick="filterKategori('tas')">Tas</button>
<button class="katBtn" onclick="filterKategori('sepatu')">Sepatu</button>
<button class="katBtn" onclick="filterKategori('jaket')">Jaket</button>

</div>

<!-- PRODUK -->

<div class="container" id="produk"></div>

<!-- WA -->

<div class="waFloat" onclick="openWA()">
<i class="fa-brands fa-whatsapp"></i>
</div>

<!-- FOOTER -->

<div class="footer">

<div class="menu">
<i class="fa-solid fa-house"></i>
Home
</div>

<div class="menu">
<i class="fa-solid fa-cart-shopping"></i>
Cart
</div>

<div class="menu" onclick="openWA()">
<i class="fa-brands fa-whatsapp"></i>
Chat
</div>

</div>

<script>

/* DATA PRODUK */

let produk = [

{
id:1,
nama:"Baju Fashion",
kategori:"baju",
harga:120000,
rating:4.5,
img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
},

{
id:2,
nama:"Tas Wanita",
kategori:"tas",
harga:150000,
rating:4.8,
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"
},

{
id:3,
nama:"Sepatu Trend",
kategori:"sepatu",
harga:200000,
rating:4.6,
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"
},

{
id:4,
nama:"Jaket Pria",
kategori:"jaket",
harga:250000,
rating:4.7,
img:"https://images.unsplash.com/photo-1520975922284-9f8c2c2bdf1a"
}

]

/* FORMAT RUPIAH */

function rupiah(n){
return "Rp " + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".")
}

/* RENDER PRODUK */

function renderProduk(data){

let html = ""

data.forEach(p => {

html += `

<div class="card">

<img src="${p.img}">

<div class="nama">${p.nama}</div>

<div class="harga">${rupiah(p.harga)}</div>

<div class="rating">⭐ ${p.rating}</div>

</div>

`

})

document.getElementById("produk").innerHTML = html

}

/* SEARCH */

function searchProduk(k){

k = k.toLowerCase()

let hasil = produk.filter(p =>
p.nama.toLowerCase().includes(k)
)

renderProduk(hasil)

}

/* FILTER KATEGORI */

function filterKategori(k){

if(k === "semua"){

renderProduk(produk)

}else{

let hasil = produk.filter(p => p.kategori === k)

renderProduk(hasil)

}

}

/* WHATSAPP */

function openWA(){

window.open("https://wa.me/6281220549530")

}

/* LOAD PRODUK */

renderProduk(produk)

</script>

</body>
</html>
