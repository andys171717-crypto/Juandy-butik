<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JUANDY BUTIK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

header{
background:#ff5722;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

.logo{
font-size:20px;
font-weight:bold;
}

.cart{
cursor:pointer;
font-size:20px;
}

/* BANNER */

.banner{
width:100%;
height:160px;
overflow:hidden;
}

.banner img{
width:100%;
height:160px;
object-fit:cover;
}

/* CATEGORY */

.category{
display:flex;
overflow:auto;
gap:10px;
padding:10px;
background:white;
}

.category div{
background:#eee;
padding:8px 12px;
border-radius:20px;
font-size:14px;
}

/* PRODUCT GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 5px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.card h4{
margin:8px;
font-size:14px;
}

.price{
margin:8px;
color:#ff5722;
font-weight:bold;
}

button{
margin:8px;
padding:8px;
width:90%;
border:none;
border-radius:6px;
background:#ff5722;
color:white;
cursor:pointer;
}

/* CART PAGE */

.page{
display:none;
}

.cartItem{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

/* LOGIN */

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

input{
padding:10px;
margin:6px;
width:220px;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:white;
margin-top:20px;
}

/* WA BUTTON */

.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.wa img{
width:35px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="page center">

<h2>Login JUANDY BUTIK</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p onclick="showRegister()">Daftar akun</p>
<p onclick="forgot()">Lupa password</p>

</div>

<!-- REGISTER -->

<div id="registerPage" class="page center">

<h2>Daftar Akun</h2>

<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password minimal 5 digit">

<select id="question">
<option>Nama ibu?</option>
<option>Hewan peliharaan?</option>
<option>Makanan favorit?</option>
</select>

<input id="answer" placeholder="Jawaban">

<button onclick="register()">Daftar</button>

<p onclick="showLogin()">Kembali</p>

</div>

<!-- STORE -->

<div id="storePage" class="page">

<header>

<div class="logo">JUANDY BUTIK</div>

<div>

<span id="userName"></span>

<span class="cart" onclick="openCart()">
🛒 <span id="cartCount">0</span>
</span>

<button onclick="logout()">Logout</button>

</div>

</header>

<!-- BANNER -->

<div class="banner">

<img id="slide" src="https://images.unsplash.com/photo-1445205170230-053b83016050">

</div>

<!-- CATEGORY -->

<div class="category">

<div>Fashion</div>
<div>Tas</div>
<div>Sepatu</div>
<div>Jaket</div>

</div>

<!-- PRODUCT -->

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h4>Baju Fashion</h4>
<div class="price">Rp120000</div>
<button onclick="addCart('Baju Fashion',120000)">Tambah</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
<h4>Tas Wanita</h4>
<div class="price">Rp150000</div>
<button onclick="addCart('Tas Wanita',150000)">Tambah</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h4>Sepatu Trend</h4>
<div class="price">Rp200000</div>
<button onclick="addCart('Sepatu Trend',200000)">Tambah</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
<h4>Jaket Pria</h4>
<div class="price">Rp250000</div>
<button onclick="addCart('Jaket Pria',250000)">Tambah</button>
</div>

</div>

<footer>

<p>© 2026 JUANDY BUTIK</p>
<p>Toko Fashion Online</p>

</footer>

</div>

<!-- CART -->

<div id="cartPage" class="page">

<header>

<div>Keranjang</div>

<button onclick="showStore()">Kembali</button>

</header>

<div id="cartList"></div>

<center>

<h2 id="totalHarga"></h2>

<button onclick="checkout()">Checkout WhatsApp</button>

</center>

</div>

<a class="wa" href="https://wa.me/6281220549530" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

<script>

let cart={}
let totalItem=0

function hideAll(){
loginPage.style.display="none"
registerPage.style.display="none"
storePage.style.display="none"
cartPage.style.display="none"
}

function showLogin(){
hideAll()
loginPage.style.display="flex"
}

function showRegister(){
hideAll()
registerPage.style.display="flex"
}

function showStore(){
hideAll()
storePage.style.display="block"
}

function register(){

let pass=regPass.value

if(pass.length<5){
alert("Password minimal 5 digit")
return
}

localStorage.setItem("user",regUser.value)
localStorage.setItem("pass",pass)
localStorage.setItem("question",question.value)
localStorage.setItem("answer",answer.value)

alert("Pendaftaran berhasil")

showLogin()

}

function login(){

if(loginUser.value===localStorage.getItem("user") &&
loginPass.value===localStorage.getItem("pass")){

userName.innerText="Hi "+loginUser.value

showStore()

}else{

alert("Login gagal")

}

}

function logout(){

showLogin()

}

function forgot(){

let q=localStorage.getItem("question")

let a=prompt(q)

if(a===localStorage.getItem("answer")){
alert("Password: "+localStorage.getItem("pass"))
}else{
alert("Jawaban salah")
}

}

function addCart(name,price){

if(!cart[name]){
cart[name]={qty:0,price:price}
}

cart[name].qty++

totalItem++

cartCount.innerText=totalItem

}

function openCart(){

hideAll()
cartPage.style.display="block"

let html=""
let total=0

for(let name in cart){

let item=cart[name]
let sub=item.qty*item.price

total+=sub

html+=`
<div class="cartItem">
<h3>${name}</h3>
<p>${item.qty} pcs</p>
<p>Rp ${sub}</p>
</div>
`

}

cartList.innerHTML=html
totalHarga.innerText="Total Rp "+total

}

function checkout(){

let text="Pesanan JUANDY BUTIK:%0A"

for(let name in cart){

text+=name+" "+cart[name].qty+" pcs%0A"

}

window.open("https://wa.me/6281220549530?text="+text)

}

/* SLIDER */

let banner=[
"https://images.unsplash.com/photo-1445205170230-053b83016050",
"https://images.unsplash.com/photo-1490481651871-ab68de25d43d",
"https://images.unsplash.com/photo-1483985988355-763728e1935b"
]

let i=0

setInterval(()=>{
i++
if(i>=banner.length)i=0
slide.src=banner[i]
},3000)

showLogin()

</script>

</body>
</html>
