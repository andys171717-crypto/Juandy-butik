<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JUANDY BUTIK</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

/* HEADER */

.header{
background:#ff5722;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* LOGIN PAGE */

.page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:25px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#ff5722;
border:none;
color:white;
border-radius:6px;
}

.link{
text-align:center;
margin-top:10px;
cursor:pointer;
}

/* PRODUK */

.banner img{
width:100%;
}

.menu{
display:flex;
gap:10px;
padding:10px;
}

.menu div{
background:#ddd;
padding:8px 12px;
border-radius:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.card img{
width:100%;
}

.card h3{
margin:10px;
}

.card p{
margin:10px;
color:#ff5722;
font-weight:bold;
}

.card button{
margin:10px;
}

/* CART */

.cartPage{
display:none;
padding:10px;
}

.cartItem{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

.total{
font-size:22px;
text-align:center;
margin:20px;
}

/* WA BUTTON */

.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
color:white;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="page">

<div class="box">

<h2>Login JUANDY BUTIK</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="link" onclick="showDaftar()">Daftar akun</div>
<div class="link" onclick="lupa()">Lupa password</div>

</div>
</div>

<!-- DAFTAR -->

<div id="daftarPage" class="page" style="display:none">

<div class="box">

<h2>Daftar</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<input id="q1" placeholder="Pertanyaan 1">
<input id="a1" placeholder="Jawaban">

<input id="q2" placeholder="Pertanyaan 2">
<input id="a2" placeholder="Jawaban">

<input id="q3" placeholder="Pertanyaan 3">
<input id="a3" placeholder="Jawaban">

<button onclick="daftar()">Daftar</button>

<div class="link" onclick="showLogin()">Kembali</div>

</div>
</div>

<!-- SHOP -->

<div id="shopPage" style="display:none">

<div class="header">

<b>JUANDY BUTIK</b>

<div>

Hi <span id="namaUser"></span>
🛒 <span id="cartCount">0</span>

<br>

<span onclick="logout()">Logout</span>

</div>

</div>

<div class="banner">

<img src="https://images.unsplash.com/photo-1445205170230-053b83016050">

</div>

<div class="menu">

<div>Fashion</div>
<div>Tas</div>
<div>Sepatu</div>
<div>Jaket</div>

</div>

<div class="grid">

<div class="card">

<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">

<h3>Baju Fashion</h3>

<p>Rp120000</p>

<button onclick="addCart('Baju Fashion',120000)">Tambah</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">

<h3>Tas Wanita</h3>

<p>Rp150000</p>

<button onclick="addCart('Tas Wanita',150000)">Tambah</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1519741497674-611481863552">

<h3>Sepatu Trend</h3>

<p>Rp200000</p>

<button onclick="addCart('Sepatu Trend',200000)">Tambah</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1520974735194-7f18c41d1c7c">

<h3>Jaket Pria</h3>

<p>Rp250000</p>

<button onclick="addCart('Jaket Pria',250000)">Tambah</button>

</div>

</div>

</div>

<!-- CART PAGE -->

<div id="cartPage" class="cartPage">

<div class="header">

Keranjang

<span onclick="backShop()">Kembali</span>

</div>

<div id="cartList"></div>

<div class="total" id="totalHarga"></div>

<button onclick="checkout()">Checkout WhatsApp</button>

</div>

<!-- WHATSAPP -->

<a class="wa" href="https://wa.me/6280000000000">🟢</a>

<script>

/* LOGIN SYSTEM */

function showDaftar(){
loginPage.style.display="none"
daftarPage.style.display="flex"
}

function showLogin(){
daftarPage.style.display="none"
loginPage.style.display="flex"
}

function daftar(){

if(pass.value.length<5){

alert("Password minimal 5 digit")
return

}

localStorage.setItem("user",user.value)
localStorage.setItem("pass",pass.value)

localStorage.setItem("q1",q1.value)
localStorage.setItem("a1",a1.value)

localStorage.setItem("q2",q2.value)
localStorage.setItem("a2",a2.value)

localStorage.setItem("q3",q3.value)
localStorage.setItem("a3",a3.value)

alert("Akun dibuat")

showLogin()

}

function login(){

if(loginUser.value==localStorage.getItem("user") &&
loginPass.value==localStorage.getItem("pass")){

localStorage.setItem("login","yes")

start()

}else{

alert("Login gagal")

}

}

function start(){

loginPage.style.display="none"

shopPage.style.display="block"

namaUser.innerText=localStorage.getItem("user")

}

window.onload=function(){

if(localStorage.getItem("login")=="yes"){
start()
}

}

/* LOGOUT */

function logout(){

localStorage.removeItem("login")

location.reload()

}

/* LUPA PASSWORD */

function lupa(){

let j1=prompt(localStorage.getItem("q1"))
let j2=prompt(localStorage.getItem("q2"))
let j3=prompt(localStorage.getItem("q3"))

if(j1==localStorage.getItem("a1") &&
j2==localStorage.getItem("a2") &&
j3==localStorage.getItem("a3")){

let baru=prompt("Password baru")

if(baru.length<5){

alert("Minimal 5 digit")
return

}

localStorage.setItem("pass",baru)

alert("Password diganti")

}else{

alert("Jawaban salah")

}

}

/* CART */

let cart=[]

function addCart(nama,harga){

cart.push({nama,harga})

cartCount.innerText=cart.length

}

/* CART PAGE */

function showCart(){

shopPage.style.display="none"

cartPage.style.display="block"

renderCart()

}

function backShop(){

cartPage.style.display="none"

shopPage.style.display="block"

}

function renderCart(){

let html=""

let total=0

cart.forEach(item=>{

html+=`

<div class="cartItem">

<h3>${item.nama}</h3>

<p>Rp ${item.harga}</p>

</div>

`

total+=item.harga

})

cartList.innerHTML=html

totalHarga.innerText="Total Rp "+total

}

/* CHECKOUT */

function checkout(){

let pesan="Pesanan:%0A"

let total=0

cart.forEach(item=>{

pesan+=item.nama+" - Rp"+item.harga+"%0A"

total+=item.harga

})

pesan+="Total Rp"+total

window.open("https://wa.me/6280000000000?text="+pesan)

}

</script>

</body>
</html>
