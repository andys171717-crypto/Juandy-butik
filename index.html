<!DOCTYPE html>
<html>
<head>
<title>JUANDY BUTIK</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
}

/* HEADER */

header{
background:black;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
position:sticky;
top:0;
z-index:100;
}

/* CART */

.cart{
position:absolute;
right:15px;
top:15px;
background:#00cc66;
padding:8px 12px;
border-radius:8px;
font-size:14px;
}

/* BANNER */

.banner{
background:linear-gradient(45deg,#ff0077,#6600ff);
padding:35px;
text-align:center;
font-size:20px;
}

/* SEARCH */

.search{
padding:20px;
text-align:center;
}

.search input{
width:90%;
max-width:400px;
padding:12px;
border-radius:6px;
border:none;
font-size:16px;
}

/* PRODUCT GRID */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.product{
background:#1c1c1c;
border-radius:12px;
padding:15px;
text-align:center;
transition:0.3s;
}

.product:hover{
transform:scale(1.04);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.product h3{
margin:10px 0;
}

.price{
color:#00ff99;
font-size:18px;
margin-bottom:10px;
}

/* BUTTON */

button{
background:#00cc66;
border:none;
padding:10px 14px;
border-radius:6px;
color:white;
cursor:pointer;
font-size:14px;
margin:4px;
}

button:hover{
background:#00ff99;
}

/* WHATSAPP FLOAT */

.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:16px;
border-radius:50%;
font-size:20px;
text-decoration:none;
color:white;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:black;
margin-top:20px;
font-size:14px;
}

</style>
</head>

<body>

<header>
JUANDY BUTIK
<div class="cart">🛒 Cart: <span id="cart">0</span></div>
</header>

<div class="banner">
🔥 Promo Fashion Terbaru 🔥 <br>
Belanja murah langsung dari toko kami
</div>

<div class="search">
<input type="text" id="search" placeholder="Cari produk..." onkeyup="searchProduct()">
</div>

<div class="container">

<div class="product">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Baju Fashion</h3>
<div class="price">Rp120.000</div>
<button onclick="addCart()">Tambah</button>
<button onclick="order('Baju Fashion')">Beli</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
<h3>Tas Wanita</h3>
<div class="price">Rp150.000</div>
<button onclick="addCart()">Tambah</button>
<button onclick="order('Tas Wanita')">Beli</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1549298916-b41d501d3772">
<h3>Sepatu Trend</h3>
<div class="price">Rp200.000</div>
<button onclick="addCart()">Tambah</button>
<button onclick="order('Sepatu Trend')">Beli</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea">
<h3>Jaket Pria</h3>
<div class="price">Rp250.000</div>
<button onclick="addCart()">Tambah</button>
<button onclick="order('Jaket Pria')">Beli</button>
</div>

</div>

<footer>
© 2026 JUANDY BUTIK
</footer>

<a class="wa" href="https://wa.me/628123456789">💬</a>

<script>

let total=0;

function addCart(){
total++;
document.getElementById("cart").innerText=total;
}

function order(product){

let nomor="628123456789";

let pesan="Halo saya mau beli "+product;

window.open("https://wa.me/"+nomor+"?text="+encodeURIComponent(pesan));

}

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase();

let products=document.getElementsByClassName("product");

for(let i=0;i<products.length;i++){

let text=products[i].innerText.toLowerCase();

if(text.includes(input)){
products[i].style.display="block";
}else{
products[i].style.display="none";
}

}

}

</script>

</body>
</html>
