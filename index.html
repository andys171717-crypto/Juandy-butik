<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JUANDY BUTIK</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:black;
}

.logo{
font-weight:bold;
font-size:20px;
}

/* SEARCH */

.search{
padding:10px;
background:#111;
}

.search input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
}

/* BANNER */

.banner{
width:100%;
height:150px;
overflow:hidden;
}

.banner img{
width:100%;
height:150px;
object-fit:cover;
}

/* FILTER */

.filter{
display:flex;
gap:10px;
padding:10px;
overflow:auto;
}

.filter button{
background:#222;
border:none;
color:white;
padding:6px 12px;
border-radius:20px;
}

/* GRID */

.container{
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

/* CARD */

.card{
background:#1c1c1c;
border-radius:15px;
overflow:hidden;
text-align:center;
animation:fadeIn .4s ease;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.nama{
font-weight:bold;
margin-top:8px;
}

.harga{
color:#ccc;
}

.qty{
display:flex;
justify-content:center;
gap:6px;
margin:10px;
}

.qty button{
background:#00c853;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
}

.qty input{
width:50px;
text-align:center;
border:none;
border-radius:6px;
}

/* CART */

.cart{
position:fixed;
top:15px;
right:15px;
background:#25D366;
padding:8px 10px;
border-radius:20px;
}

/* WHATSAPP */

.wa{
position:fixed;
bottom:80px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
}

footer{
text-align:center;
padding:20px;
color:#aaa;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
JUANDY BUTIK
</div>

<div class="cart">
<i class="fa-solid fa-cart-shopping"></i>
<span id="cartCount">0</span>
</div>

</div>

<div class="search">

<input type="text" id="search"
placeholder="Cari produk..."
onkeyup="cariProduk()">

</div>

<div class="banner">

<img id="bannerImg"
src="https://images.unsplash.com/photo-1607082349566-187342175e2f">

</div>

<div class="filter">

<button onclick="filter('all')">Semua</button>
<button onclick="filter('baju')">Baju</button>
<button onclick="filter('tas')">Tas</button>
<button onclick="filter('sepatu')">Sepatu</button>

</div>

<div class="container" id="produk"></div>

<div class="wa" onclick="checkout()">
<i class="fa-brands fa-whatsapp"></i>
</div>

<footer>

© 2026 JUANDY BUTIK  
Belanja mudah langsung WhatsApp

</footer>

<script>

/* DATA PRODUK */

let produk=[

{nama:"Baju Fashion",harga:120000,kategori:"baju",
img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},

{nama:"Tas Wanita",harga:150000,kategori:"tas",
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"},

{nama:"Sepatu Trend",harga:200000,kategori:"sepatu",
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"}

]

let cart=[]

/* TAMPIL PRODUK */

function tampil(data){

let html=""

data.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<div class="nama">${p.nama}</div>

<div class="harga">Rp ${p.harga}</div>

<div class="qty">

<button onclick="minus(${i})">-</button>

<input value="0" id="q${i}">

<button onclick="plus(${i})">+</button>

</div>

</div>

`

})

document.getElementById("produk").innerHTML=html

}

tampil(produk)

/* SEARCH */

function cariProduk(){

let key=document.getElementById("search").value.toLowerCase()

let hasil=produk.filter(p=>p.nama.toLowerCase().includes(key))

tampil(hasil)

}

/* FILTER */

function filter(k){

if(k=="all"){

tampil(produk)

}else{

let hasil=produk.filter(p=>p.kategori==k)

tampil(hasil)

}

}

/* CART */

function plus(i){

let q=document.getElementById("q"+i)

q.value++

updateCart()

}

function minus(i){

let q=document.getElementById("q"+i)

if(q.value>0)q.value--

updateCart()

}

function updateCart(){

let total=0

document.querySelectorAll("input").forEach(i=>{

total+=parseInt(i.value)

})

document.getElementById("cartCount").innerText=total

}

/* CHECKOUT */

function checkout(){

let pesan="Halo saya ingin memesan:%0A%0A"

document.querySelectorAll(".card").forEach((c,i)=>{

let qty=document.getElementById("q"+i)

if(qty && qty.value>0){

pesan+=produk[i].nama+" x "+qty.value+"%0A"

}

})

window.open("https://wa.me/6281220549530?text="+pesan)

}

/* SLIDER */

let banner=[
"https://images.unsplash.com/photo-1607082349566-187342175e2f",
"https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a",
"https://images.unsplash.com/photo-1445205170230-053b83016050"
]

let i=0

setInterval(()=>{

i++

if(i>=banner.length)i=0

document.getElementById("bannerImg").src=banner[i]

},3000)

</script>

</body>
</html>
