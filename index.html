<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUANDY BUTIK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* LOGIN & REGISTER */

#loginPage,#registerPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:5000;
}

#registerPage{
display:none;
}

input{
padding:12px;
margin:10px;
border-radius:8px;
border:none;
width:220px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

/* HEADER */

header{
background:black;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
z-index:1000;
}

.user{
position:absolute;
left:15px;
top:15px;
font-size:12px;
color:#aaa;
}

.cart{
position:absolute;
right:15px;
top:10px;
background:#00c853;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

/* PRODUK */

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#1a1a1a;
border-radius:15px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#00e676;
font-weight:bold;
margin:8px;
}

.qty{
font-size:13px;
color:#aaa;
margin-top:5px;
}

/* CART */

#cartBox{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:60%;
background:#111;
border-top-left-radius:20px;
border-top-right-radius:20px;
padding:20px;
overflow:auto;
transition:0.3s;
z-index:2000;
}

#cartBox.active{
bottom:0;
}

.item{
background:#222;
padding:10px;
margin:10px 0;
border-radius:10px;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
color:#888;
}

/* WA FLOAT */

.waFloat{
position:fixed;
bottom:80px;
right:20px;
background:#25D366;
padding:14px 18px;
border-radius:30px;
color:white;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<h2>Login JUANDY BUTIK</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>Belum punya akun?
<span onclick="showRegister()" style="color:#00e676;cursor:pointer;">Daftar</span>
</p>

</div>

<!-- REGISTER -->

<div id="registerPage">

<h2>Daftar Akun</h2>

<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">

<button onclick="register()">Daftar</button>

<p>Sudah punya akun?
<span onclick="showLogin()" style="color:#00e676;cursor:pointer;">Login</span>
</p>

</div>

<header>

<div class="user" id="userText"></div>

JUANDY BUTIK

<div class="cart" onclick="openCart()">🛒 <span id="cartCount">0</span></div>

</header>

<!-- PRODUK -->

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>Baju Fashion</h3>
<div class="price">Rp120000</div>
<button onclick="addCart('Baju Fashion',120000,'q1')">Tambah</button>
<div class="qty" id="q1">0 pcs</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
<h3>Tas Wanita</h3>
<div class="price">Rp150000</div>
<button onclick="addCart('Tas Wanita',150000,'q2')">Tambah</button>
<div class="qty" id="q2">0 pcs</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Sepatu Trend</h3>
<div class="price">Rp200000</div>
<button onclick="addCart('Sepatu Trend',200000,'q3')">Tambah</button>
<div class="qty" id="q3">0 pcs</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551028719-00167b16eac5">
<h3>Jaket Pria</h3>
<div class="price">Rp250000</div>
<button onclick="addCart('Jaket Pria',250000,'q4')">Tambah</button>
<div class="qty" id="q4">0 pcs</div>
</div>

</div>

<footer>

© 2026 JUANDY BUTIK  
Fashion Store Online

</footer>

<a class="waFloat" href="https://wa.me/6281220549530" target="_blank">
Chat WhatsApp
</a>

<div id="cartBox">

<h2>Keranjang Belanja</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

<button onclick="checkout()">Checkout WhatsApp</button>
<button onclick="closeCart()">Tutup</button>

</div>

<script>

let cart={}
let totalItem=0

/* LOGIN */

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

let savedPass=localStorage.getItem("akun_"+user)

if(pass===savedPass){

localStorage.setItem("juandyUser",user)

document.getElementById("loginPage").style.display="none"

document.getElementById("userText").innerText="Halo "+user

}else{

alert("Username atau password salah")

}

}

/* REGISTER */

function register(){

let user=document.getElementById("regUser").value
let pass=document.getElementById("regPass").value

if(user=="" || pass==""){
alert("Isi username dan password")
return
}

localStorage.setItem("akun_"+user,pass)

alert("Akun berhasil dibuat!")

showLogin()

}

/* SWITCH FORM */

function showRegister(){

document.getElementById("loginPage").style.display="none"
document.getElementById("registerPage").style.display="flex"

}

function showLogin(){

document.getElementById("registerPage").style.display="none"
document.getElementById("loginPage").style.display="flex"

}

/* TAMBAH PRODUK */

function addCart(nama,harga,id){

if(!cart[nama]){
cart[nama]={harga:harga,qty:0}
}

cart[nama].qty++

totalItem++

document.getElementById("cartCount").innerText=totalItem

document.getElementById(id).innerText=cart[nama].qty+" pcs"

}

/* CART */

function openCart(){

let items=document.getElementById("cartItems")

items.innerHTML=""

let total=0

for(let nama in cart){

let item=cart[nama]

let subtotal=item.qty*item.harga

items.innerHTML+=`
<div class="item">
${nama} (${item.qty} pcs) - Rp${subtotal}
</div>
`

total+=subtotal

}

document.getElementById("total").innerText="Total: Rp"+total

document.getElementById("cartBox").classList.add("active")

}

function closeCart(){

document.getElementById("cartBox").classList.remove("active")

}

/* CHECKOUT */

function checkout(){

let pesan="Halo saya ingin membeli:%0A"

let total=0

for(let nama in cart){

let item=cart[nama]

let subtotal=item.qty*item.harga

pesan+=nama+" ("+item.qty+" pcs) - Rp"+subtotal+"%0A"

total+=subtotal

}

pesan+="%0ATotal: Rp"+total

window.open("https://wa.me/6281220549530?text="+pesan)

}

</script>

</body>
</html>
