<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JUANDY BUTIK</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#ff5722;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.banner{
width:100%;
height:200px;
object-fit:cover;
}

.container{
padding:15px;
}

.category{
display:flex;
gap:10px;
margin:10px 0;
}

.category button{
border:none;
background:#ddd;
padding:8px 12px;
border-radius:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
margin:10px;
}

.price{
color:#ff5722;
font-weight:bold;
margin:10px;
}

.btn{
background:#ff5722;
color:white;
border:none;
padding:10px;
margin:10px;
width:90%;
border-radius:6px;
}

.cart{
cursor:pointer;
font-weight:bold;
}

.login{
background:white;
padding:20px;
max-width:350px;
margin:80px auto;
border-radius:10px;
text-align:center;
}

.login input{
width:90%;
padding:10px;
margin:8px;
}

.popup{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:20px;
display:none;
border-top:3px solid #ff5722;
max-height:350px;
overflow:auto;
}

.checkout{
background:green;
color:white;
padding:10px;
margin-top:10px;
border:none;
width:100%;
}

</style>
</head>

<body>

<div id="loginPage" class="login">

<h2>Login JUANDY BUTIK</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

<p onclick="register()">Daftar akun</p>
<p onclick="lupa()">Lupa password</p>

</div>

<div id="shop" style="display:none">

<div class="header">

<b>JUANDY BUTIK</b>

<div>
Hi <span id="user"></span>
<span class="cart" onclick="openCart()">🛒 <span id="cartCount">0</span></span>
<span onclick="logout()">Logout</span>
</div>

</div>

<img class="banner" src="https://images.unsplash.com/photo-1441986300917-64674bd600d8">

<div class="container">

<div class="category">

<button onclick="filter('all')">Fashion</button>
<button onclick="filter('tas')">Tas</button>
<button onclick="filter('sepatu')">Sepatu</button>
<button onclick="filter('jaket')">Jaket</button>

</div>

<div id="produk" class="grid"></div>

</div>

</div>

<div id="cartPopup" class="popup"></div>

<script>

let produk=[
{nama:"Baju Fashion",harga:120000,kategori:"fashion",img:"https://images.unsplash.com/photo-1520975922284-8b456906c813"},
{nama:"Tas Wanita",harga:150000,kategori:"tas",img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"},
{nama:"Sepatu Trend",harga:200000,kategori:"sepatu",img:"https://images.unsplash.com/photo-1528701800489-20be3c68dfd8"},
{nama:"Jaket Pria",harga:250000,kategori:"jaket",img:"https://images.unsplash.com/photo-1520974735194-9c7e70c4b6f7"}
]

let cart=[]

function tampil(kat="all"){

let html=""

produk.forEach(p=>{

if(kat=="all" || p.kategori==kat){

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.nama}</h3>

<div class="price">Rp${p.harga}</div>

<button class="btn" onclick="tambah('${p.nama}',${p.harga})">Tambah</button>

</div>

`

}

})

document.getElementById("produk").innerHTML=html

}

function filter(k){

tampil(k)

}

function tambah(nama,harga){

cart.push({nama:nama,harga:harga})

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

alert("Produk ditambahkan ke keranjang")

}

function updateCart(){

cart=JSON.parse(localStorage.getItem("cart"))||[]

document.getElementById("cartCount").innerText=cart.length

}

function openCart(){

let html="<h3>Keranjang</h3>"

let total=0

cart.forEach((item,i)=>{

html+=item.nama+" - Rp"+item.harga+" <button onclick='hapus("+i+")'>X</button><br>"

total+=item.harga

})

html+="<hr>Total: Rp"+total

html+=`<button class="checkout" onclick="checkout(${total})">Checkout WhatsApp</button>`

document.getElementById("cartPopup").innerHTML=html
document.getElementById("cartPopup").style.display="block"

}

function hapus(i){

cart.splice(i,1)

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

openCart()

}

function checkout(total){

let text="Halo saya ingin pesan:%0A"

cart.forEach(item=>{

text+=item.nama+" - Rp"+item.harga+"%0A"

})

text+="Total: Rp"+total

window.open("https://wa.me/6281234567890?text="+text)

}

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

let data=JSON.parse(localStorage.getItem("user"))

if(!data){
alert("Belum ada akun, silakan daftar")
return
}

if(u==data.username && p==data.password){

document.getElementById("loginPage").style.display="none"
document.getElementById("shop").style.display="block"

document.getElementById("user").innerText=u

tampil()

updateCart()

}else{

alert("Login salah")

}

}

function register(){

let u=prompt("Buat Username")
let p=prompt("Buat Password")
let q=prompt("Pertanyaan keamanan")
let a=prompt("Jawaban")

localStorage.setItem("user",JSON.stringify({
username:u,
password:p,
q:q,
a:a
}))

alert("Akun berhasil dibuat")

}

function lupa(){

let data=JSON.parse(localStorage.getItem("user"))

if(!data){
alert("Belum ada akun")
return
}

let j=prompt(data.q)

if(j==data.a){

alert("Password kamu: "+data.password)

}else{

alert("Jawaban salah")

}

}

function logout(){

location.reload()

}

</script>

</body>
</html>
