<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JUANDY BUTIK</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:black;
}

.logo{
font-size:20px;
font-weight:bold;
}

.cart{
background:#25D366;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

/* SEARCH */

.search{
padding:10px;
background:#111;
}

.search input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
}

/* BANNER */

.banner{
width:100%;
height:160px;
overflow:hidden;
}

.banner img{
width:100%;
height:160px;
object-fit:cover;
}

/* FILTER */

.filter{
display:flex;
gap:10px;
padding:10px;
}

.filter button{
background:#222;
border:none;
color:white;
padding:6px 12px;
border-radius:20px;
}

/* GRID */

.container{
padding:12px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

/* CARD */

.card{
background:#1c1c1c;
border-radius:15px;
overflow:hidden;
text-align:center;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.nama{
font-weight:bold;
margin-top:8px;
}

.harga{
color:#ccc;
margin-bottom:8px;
}

/* QTY */

.qty{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
margin-bottom:12px;
}

.qty button{
background:#00c853;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
}

.qty input{
width:55px;
text-align:center;
border:none;
border-radius:6px;
font-size:16px;
}

/* CART PANEL */

.cartBox{
position:fixed;
top:0;
right:-100%;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:0.4s;
overflow:auto;
}

.cartBox.active{
right:0;
}

.cartItem{
border-bottom:1px solid #333;
padding:10px 0;
}

.checkout{
background:#25D366;
width:100%;
padding:12px;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
margin-top:10px;
}

.closeCart{
background:#333;
width:100%;
padding:12px;
border:none;
border-radius:8px;
color:white;
margin-top:10px;
}

/* WHATSAPP */

.wa{
position:fixed;
bottom:90px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
}

footer{
text-align:center;
padding:20px;
color:#aaa;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">JUANDY BUTIK</div>

<div class="cart" onclick="toggleCart()">
<i class="fa-solid fa-cart-shopping"></i>
<span id="cartCount">0</span>
</div>

</div>

<div class="search">

<input type="text"
placeholder="Cari produk..."
onkeyup="searchProduk(this.value)">

</div>

<div class="banner">

<img id="bannerImg"
src="https://images.unsplash.com/photo-1607082349566-187342175e2f">

</div>

<div class="filter">

<button onclick="filterProduk('all')">Semua</button>
<button onclick="filterProduk('baju')">Baju</button>
<button onclick="filterProduk('tas')">Tas</button>
<button onclick="filterProduk('sepatu')">Sepatu</button>

</div>

<div class="container" id="produk"></div>

<!-- CART -->

<div class="cartBox" id="cartBox">

<h2>Keranjang</h2>

<div id="cartItems"></div>

<button class="checkout" onclick="checkout()">
Checkout WhatsApp
</button>

<button class="closeCart" onclick="toggleCart()">
Tutup
</button>

</div>

<div class="wa" onclick="checkout()">
<i class="fa-brands fa-whatsapp"></i>
</div>

<footer>

© 2026 JUANDY BUTIK  
Belanja mudah langsung WhatsApp

</footer>

<script>

/* DATA PRODUK */

let produk=[

{ id:1,nama:"Baju Fashion",harga:120000,kategori:"baju",
img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},

{ id:2,nama:"Tas Wanita",harga:150000,kategori:"tas",
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"},

{ id:3,nama:"Sepatu Trend",harga:200000,kategori:"sepatu",
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},

{ id:4,nama:"Jaket Pria",harga:250000,kategori:"baju",
img:"https://images.unsplash.com/photo-1548883354-7622d03aca27"}

]

let cart=[]

/* TAMPIL PRODUK */

function tampilProduk(data){

let html=""

data.forEach(p=>{

html+=`

<div class="card">

<img src="${p.img}">

<div class="nama">${p.nama}</div>

<div class="harga">Rp ${p.harga}</div>

<div class="qty">

<button onclick="minus(${p.id})">-</button>

<input type="text"
id="q${p.id}"
value="0"
inputmode="numeric"
oninput="ubahQty(${p.id},this.value)">

<button onclick="plus(${p.id})">+</button>

</div>

</div>

`

})

document.getElementById("produk").innerHTML=html

}

tampilProduk(produk)

/* QTY BUTTON */

function plus(id){

let q=document.getElementById("q"+id)
q.value=parseInt(q.value||0)+1
updateCart()

}

function minus(id){

let q=document.getElementById("q"+id)
let v=parseInt(q.value||0)

if(v>0)v--

q.value=v

updateCart()

}

/* QTY KETIK */

function ubahQty(id,val){

val=val.replace(/[^0-9]/g,'')

if(val=="") val=0

document.getElementById("q"+id).value=parseInt(val)

updateCart()

}

/* UPDATE CART */

function updateCart(){

cart=[]
let total=0

produk.forEach(p=>{

let q=document.getElementById("q"+p.id)

if(q){

let qty=parseInt(q.value)||0

if(qty>0){

cart.push({
nama:p.nama,
harga:p.harga,
qty:qty
})

total+=qty

}

}

})

document.getElementById("cartCount").innerText=total

renderCart()

}

/* CART LIST */

function renderCart(){

let html=""

cart.forEach(i=>{

html+=`

<div class="cartItem">

${i.nama}<br>
${i.qty} x Rp ${i.harga}

</div>

`

})

document.getElementById("cartItems").innerHTML=html

}

/* CART PANEL */

function toggleCart(){

document.getElementById("cartBox").classList.toggle("active")

}

/* CHECKOUT */

function checkout(){

if(cart.length==0){

alert("Keranjang kosong")
return

}

let pesan="Halo saya ingin memesan:%0A%0A"

cart.forEach(i=>{

pesan+=i.nama+" x "+i.qty+"%0A"

})

window.open("https://wa.me/6281220549530?text="+pesan)

}

/* SEARCH */

function searchProduk(key){

key=key.toLowerCase()

let hasil=produk.filter(p=>
p.nama.toLowerCase().includes(key)
)

tampilProduk(hasil)

}

/* FILTER */

function filterProduk(k){

if(k=="all"){

tampilProduk(produk)

}else{

let hasil=produk.filter(p=>p.kategori==k)

tampilProduk(hasil)

}

}

/* SLIDER */

let banner=[

"https://images.unsplash.com/photo-1607082349566-187342175e2f",

"https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a",

"https://images.unsplash.com/photo-1445205170230-053b83016050"

]

let i=0

setInterval(()=>{

i++

if(i>=banner.length)i=0

document.getElementById("bannerImg").src=banner[i]

},3000)

</script>

</body>
</html>
