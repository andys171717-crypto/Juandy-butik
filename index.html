<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JUANDY SHOP</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(270deg,#ff512f,#ff9966);
}

.page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:25px;
border-radius:12px;
width:300px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#ff512f;
color:white;
}

.link{
margin-top:10px;
text-align:center;
color:blue;
cursor:pointer;
}

.shop{
display:none;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.logout{
position:fixed;
top:10px;
right:10px;
background:red;
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.cart{
position:fixed;
top:10px;
left:10px;
background:black;
color:white;
padding:8px 12px;
border-radius:6px;
}

.password{
position:relative;
}

.password span{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="page">

<div class="box">

<h2>Login</h2>

<input id="loginUser" placeholder="Username">

<div class="password">
<input id="loginPass" type="password" placeholder="Password">
<span onclick="lihat('loginPass')">👁</span>
</div>

<button onclick="login()">Login</button>

<div class="link" onclick="showDaftar()">Daftar akun</div>
<div class="link" onclick="lupa()">Lupa password?</div>

</div>
</div>


<!-- DAFTAR -->

<div id="daftarPage" class="page" style="display:none">

<div class="box">

<h2>Daftar</h2>

<input id="user" placeholder="Username">

<div class="password">
<input id="pass" type="password" placeholder="Password">
<span onclick="lihat('pass')">👁</span>
</div>

<input id="q1" placeholder="Pertanyaan 1: Nama ibu kamu?">
<input id="a1" placeholder="Jawaban">

<input id="q2" placeholder="Pertanyaan 2: Nama hewan peliharaan?">
<input id="a2" placeholder="Jawaban">

<input id="q3" placeholder="Pertanyaan 3: Kota kelahiran kamu?">
<input id="a3" placeholder="Jawaban">

<button onclick="daftar()">Daftar</button>

<div class="link" onclick="showLogin()">Kembali login</div>

</div>
</div>


<!-- TOKO -->

<div id="shopPage" class="shop">

<div class="cart">
Keranjang : <span id="jumlahCart">0</span>
</div>

<div class="logout" onclick="logout()">Logout</div>

<h2>Halaman Belanja</h2>

<div class="product">
Baju wanita  
<br>Harga : Rp120000
<br>
<button onclick="tambahCart('Baju wanita',120000)">Tambah</button>
</div>

<div class="product">
Tas wanita  
<br>Harga : Rp250000
<br>
<button onclick="tambahCart('Tas wanita',250000)">Tambah</button>
</div>

<div class="product">
Sepatu wanita  
<br>Harga : Rp300000
<br>
<button onclick="tambahCart('Sepatu wanita',300000)">Tambah</button>
</div>

<br>

<button onclick="checkout()">Checkout via WhatsApp</button>

</div>


<script>

/* lihat password */

function lihat(id){

let x=document.getElementById(id)

if(x.type=="password"){
x.type="text"
}else{
x.type="password"
}

}


/* pindah halaman */

function showDaftar(){

loginPage.style.display="none"
daftarPage.style.display="flex"

}

function showLogin(){

daftarPage.style.display="none"
loginPage.style.display="flex"

}


/* daftar */

function daftar(){

if(pass.value.length<5){

alert("Password minimal 5 digit")
return

}

localStorage.setItem("user",user.value)
localStorage.setItem("pass",pass.value)

localStorage.setItem("q1",q1.value)
localStorage.setItem("a1",a1.value)

localStorage.setItem("q2",q2.value)
localStorage.setItem("a2",a2.value)

localStorage.setItem("q3",q3.value)
localStorage.setItem("a3",a3.value)

alert("Akun berhasil dibuat")

showLogin()

}


/* login */

function login(){

if(loginUser.value==localStorage.getItem("user") &&
loginPass.value==localStorage.getItem("pass")){

localStorage.setItem("login","yes")

loginSukses()

}else{

alert("Username atau password salah")

}

}


function loginSukses(){

loginPage.style.display="none"
shopPage.style.display="block"

}


/* auto login */

window.onload=function(){

if(localStorage.getItem("login")=="yes"){

loginSukses()

}

}


/* logout */

function logout(){

localStorage.removeItem("login")

location.reload()

}


/* lupa password */

function lupa(){

let j1=prompt(localStorage.getItem("q1"))
let j2=prompt(localStorage.getItem("q2"))
let j3=prompt(localStorage.getItem("q3"))

if(j1==localStorage.getItem("a1") &&
j2==localStorage.getItem("a2") &&
j3==localStorage.getItem("a3")){

let baru=prompt("Masukkan password baru")

if(baru.length<5){

alert("Password minimal 5 digit")
return

}

localStorage.setItem("pass",baru)

alert("Password berhasil diganti")

}else{

alert("Jawaban salah")

}

}


/* keranjang */

let cart=[]

function tambahCart(nama,harga){

cart.push({nama,harga})

jumlahCart.innerText=cart.length

}


/* checkout */

function checkout(){

if(cart.length==0){

alert("Keranjang kosong")
return

}

let pesan="Pesanan:%0A"

let total=0

cart.forEach(item=>{

pesan+=item.nama+" - Rp"+item.harga+"%0A"

total+=item.harga

})

pesan+="Total: Rp"+total

window.open("https://wa.me/6280000000000?text="+pesan)

}

</script>

</body>
</html>
