<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JUANDY BUTIK</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
GLOBAL
========================= */

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* =========================
HEADER
========================= */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:#000;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:18px;
font-weight:bold;
}

.cartBtn{
background:#25D366;
padding:10px 14px;
border-radius:20px;
cursor:pointer;
position:relative;
}

.cartCount{
position:absolute;
top:-5px;
right:-5px;
background:red;
font-size:12px;
padding:3px 6px;
border-radius:50%;
}

/* =========================
SEARCH
========================= */

.search{
padding:10px;
background:#111;
}

.search input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
}

/* =========================
KATEGORI
========================= */

.kategori{
display:flex;
overflow:auto;
gap:8px;
padding:10px;
background:#111;
}

.kategori button{
background:#222;
border:none;
color:white;
padding:8px 12px;
border-radius:20px;
white-space:nowrap;
cursor:pointer;
}

/* =========================
BANNER
========================= */

.banner{
width:100%;
overflow:hidden;
position:relative;
}

.slider{
display:flex;
transition:0.4s;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
height:180px;
object-fit:cover;
}

/* dots */

.dots{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#aaa;
}

.dot.active{
background:#25D366;
}

/* =========================
PRODUK GRID
========================= */

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,.5);
transition:.2s;
}

.card:active{
transform:scale(.97);
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
cursor:pointer;
}

.nama{
font-size:14px;
padding:6px 8px;
height:36px;
overflow:hidden;
}

.harga{
color:#00e676;
font-weight:bold;
padding:0 8px;
}

.rating{
font-size:12px;
color:#fbc02d;
padding:0 8px;
}

/* =========================
QTY
========================= */

.qty{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
}

.qty button{
width:26px;
height:26px;
border:none;
background:#00c853;
color:white;
border-radius:6px;
cursor:pointer;
}

.qtyInput{
width:40px;
text-align:center;
background:#222;
border:none;
color:white;
border-radius:6px;
}

/* =========================
CART
========================= */

.cartBox{
position:fixed;
top:0;
right:0;
width:320px;
height:100%;
background:#111;
transform:translateX(100%);
transition:.3s;
padding:20px;
overflow:auto;
z-index:2000;
}

.cartBox.active{
transform:translateX(0);
}

/* header cart */

.cartHeader{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.backCart{
background:#333;
border:none;
color:white;
width:35px;
height:35px;
border-radius:8px;
cursor:pointer;
}

/* cart item */

.cartItem{
display:flex;
gap:10px;
margin-bottom:15px;
border-bottom:1px solid #333;
padding-bottom:10px;
}

.cartItem img{
width:50px;
height:50px;
border-radius:6px;
object-fit:cover;
}

.remove{
background:red;
border:none;
padding:3px 6px;
border-radius:4px;
color:white;
cursor:pointer;
}

/* checkout */

.checkout{
background:#25D366;
border:none;
padding:12px;
width:100%;
border-radius:8px;
margin-top:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">JUANDY BUTIK</div>

<div class="cartBtn" onclick="toggleCart()">
<i class="fa-solid fa-cart-shopping"></i>
<div class="cartCount" id="cartCount">0</div>
</div>

</div>

<!-- SEARCH -->

<div class="search">
<input type="text" id="searchInput" placeholder="Cari produk..." onkeyup="filterProduk()">
</div>

<!-- KATEGORI -->

<div class="kategori">
<button onclick="filterKategori('all')">Semua</button>
<button onclick="filterKategori('baju')">Baju</button>
<button onclick="filterKategori('tas')">Tas</button>
<button onclick="filterKategori('sepatu')">Sepatu</button>
</div>

<!-- BANNER -->

<div class="banner">

<div class="slider" id="slider">

<div class="slide">
<img src="https://images.unsplash.com/photo-1445205170230-053b83016050">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1521334884684-d80222895322">
</div>

</div>

<div class="dots">
<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

</div>

<!-- PRODUK -->

<div class="container" id="produk"></div>

<!-- CART -->

<div class="cartBox" id="cartBox">

<div class="cartHeader">

<button class="backCart" onclick="toggleCart()">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h2>Keranjang</h2>

</div>

<div id="cartItems"></div>

<h3 id="totalHarga">Total : Rp 0</h3>

<button class="checkout" onclick="checkout()">Checkout WhatsApp</button>

</div>

<script>

/* =========================
FORMAT RUPIAH
========================= */

function rupiah(n){

return "Rp "+n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".")

}

/* =========================
DATA PRODUK
========================= */

let produk=[

{id:1,nama:"Baju Fashion",kategori:"baju",harga:120000,rating:4.5,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},

{id:2,nama:"Tas Wanita",kategori:"tas",harga:150000,rating:4.8,img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"},

{id:3,nama:"Sepatu Trend",kategori:"sepatu",harga:200000,rating:4.6,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"}

]

/* =========================
CART STORAGE
========================= */

let cart=JSON.parse(localStorage.getItem("cart"))||{}

/* =========================
RENDER PRODUK
========================= */

function renderProduk(data){

let html=""

data.forEach(p=>{

html+=`

<div class="card">

<img src="${p.img}">

<div class="nama">${p.nama}</div>

<div class="harga">${rupiah(p.harga)}</div>

<div class="rating">⭐ ${p.rating}</div>

<div class="qty">

<button onclick="minus(${p.id})">-</button>

<input class="qtyInput" type="number" min="0"
value="${cart[p.id]||0}"
onchange="setQty(${p.id},this.value)">

<button onclick="plus(${p.id})">+</button>

</div>

</div>

`

})

document.getElementById("produk").innerHTML=html

updateCart()

}

renderProduk(produk)

/* =========================
QTY
========================= */

function plus(id){

cart[id]=(cart[id]||0)+1

save()

}

function minus(id){

if(cart[id]>0) cart[id]--

save()

}

function setQty(id,val){

val=parseInt(val)

if(val<=0) delete cart[id]
else cart[id]=val

save()

}

/* =========================
SAVE CART
========================= */

function save(){

localStorage.setItem("cart",JSON.stringify(cart))

renderProduk(produk)

}

/* =========================
UPDATE CART
========================= */

function updateCart(){

let total=0
let jumlah=0
let html=""

produk.forEach(p=>{

let q=cart[p.id]||0

if(q>0){

let sub=q*p.harga

total+=sub
jumlah+=q

html+=`

<div class="cartItem">

<img src="${p.img}">

<div>

<b>${p.nama}</b>

<div>${rupiah(sub)}</div>

<button class="remove"
onclick="removeItem(${p.id})">Hapus</button>

</div>

</div>

`

}

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("cartCount").innerText=jumlah
document.getElementById("totalHarga").innerText="Total : "+rupiah(total)

}

/* =========================
REMOVE ITEM
========================= */

function removeItem(id){

delete cart[id]

save()

}

/* =========================
TOGGLE CART
========================= */

function toggleCart(){

document.getElementById("cartBox").classList.toggle("active")

}

/* =========================
CHECKOUT WHATSAPP
========================= */

function checkout(){

let pesan="Halo saya ingin pesan:%0A%0A"

produk.forEach(p=>{

let q=cart[p.id]||0

if(q>0){

pesan+=p.nama+" x "+q+"%0A"

}

})

window.open("https://wa.me/6281220549530?text="+pesan)

}

/* =========================
SEARCH
========================= */

function filterProduk(){

let key=document.getElementById("searchInput").value.toLowerCase()

let hasil=produk.filter(p=>
p.nama.toLowerCase().includes(key))

renderProduk(hasil)

}

/* =========================
KATEGORI
========================= */

function filterKategori(k){

if(k=="all"){
renderProduk(produk)
return
}

let hasil=produk.filter(p=>p.kategori==k)

renderProduk(hasil)

}

/* =========================
BANNER AUTO SLIDE
========================= */

let slider=document.getElementById("slider")
let dots=document.querySelectorAll(".dot")

let index=0

function showSlide(){

slider.style.transform="translateX(-"+index*100+"%)"

dots.forEach(d=>d.classList.remove("active"))

dots[index].classList.add("active")

}

setInterval(()=>{

index++

if(index>2) index=0

showSlide()

},3000)

</script>

</body>
</html>
