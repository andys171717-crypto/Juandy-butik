<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JUANDY BUTIK</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#ff512f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
padding:15px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
}

.card img{
width:100%;
border-radius:10px;
}

button{
width:100%;
padding:10px;
background:#ff512f;
color:white;
border:none;
border-radius:6px;
}

.cart{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
}

</style>

</head>

<body>

<header>

<b>JUANDY BUTIK</b>

<div>

Keranjang <span id="count">0</span>

</div>

</header>

<div class="container">

<div class="card">

<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">

<h3>Baju Fashion</h3>

<p>Rp120000</p>

<button onclick="add('Baju Fashion',120000)">Tambah</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1590874103328-eac38a683ce7">

<h3>Tas Wanita</h3>

<p>Rp150000</p>

<button onclick="add('Tas Wanita',150000)">Tambah</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

<h3>Sepatu Trend</h3>

<p>Rp200000</p>

<button onclick="add('Sepatu Trend',200000)">Tambah</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">

<h3>Jaket Pria</h3>

<p>Rp250000</p>

<button onclick="add('Jaket Pria',250000)">Tambah</button>

</div>

</div>

<a class="cart" onclick="checkout()">🛒</a>

<script>

let cart={}
let total=0

function add(name,price){

if(!cart[name]){
cart[name]={qty:0,price:price}
}

cart[name].qty++

total++

document.getElementById("count").innerText=total

}

function checkout(){

let text="Pesanan JUANDY BUTIK:%0A"

for(let x in cart){

text+=x+" "+cart[x].qty+" pcs%0A"

}

window.open("https://wa.me/6281234567890?text="+text)

}

</script>

</body>
</html>
