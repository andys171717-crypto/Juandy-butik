<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUANDY BUTIK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:#000;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
font-weight:bold;
}

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#1c1c1c;
border-radius:15px;
overflow:hidden;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.nama{
font-size:16px;
font-weight:bold;
margin-top:10px;
}

.harga{
color:#ccc;
margin-bottom:10px;
}

button{
background:#00c853;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
margin-bottom:15px;
cursor:pointer;
font-weight:bold;
}

button:active{
transform:scale(0.95);
}

.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
cursor:pointer;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

</style>
</head>

<body>

<header>

JUANDY BUTIK

<div>
🛒 <span id="cart">0</span>
</div>

</header>

<div class="container" id="produk"></div>

<div class="wa" onclick="checkout()">☎</div>

<script>

const produk=[

{
nama:"Baju Fashion",
harga:120000,
img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500"
},

{
nama:"Tas Wanita",
harga:150000,
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500"
},

{
nama:"Sepatu Trend",
harga:200000,
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500"
},

{
nama:"Jaket Pria",
harga:250000,
img:"https://images.unsplash.com/photo-1551028719-00167b16eac5?w=500"
}

]

let cart = JSON.parse(localStorage.getItem("cart")) || []

function tampilProduk(){

let html=""

for(let i=0;i<produk.length;i++){

html+=`

<div class="card">

<img src="${produk[i].img}">

<div class="nama">${produk[i].nama}</div>

<div class="harga">Rp ${produk[i].harga}</div>

<button onclick="tambah(${i})">Tambah</button>

</div>

`

}

document.getElementById("produk").innerHTML=html

updateCart()

}

function tambah(i){

cart.push(produk[i])

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

alert("Produk ditambahkan ke keranjang")

}

function updateCart(){

document.getElementById("cart").innerText=cart.length

}

function checkout(){

if(cart.length==0){

alert("Keranjang kosong")

return

}

let pesan="Halo saya ingin pesan:%0A%0A"

for(let i=0;i<cart.length;i++){

pesan+=cart[i].nama+" - Rp "+cart[i].harga+"%0A"

}

window.open("https://wa.me/?text="+pesan)

}

tampilProduk()

</script>

</body>
</html>
