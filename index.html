<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JUANDY BUTIK</title>

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:black;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:#1c1c1c;
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

button{
background:#00c853;
border:none;
padding:8px 12px;
border-radius:6px;
color:white;
margin-top:5px;
}

.cart{
cursor:pointer;
}

.cartPage{
display:none;
padding:20px;
}

.total{
font-size:20px;
color:#00e676;
margin-top:10px;
}

.wa{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.wa img{
width:35px;
}

</style>
</head>

<body>

<header>
<b>JUANDY BUTIK</b>

<div class="cart" onclick="bukaCart()">
🛒 <span id="cartCount">0</span>
</div>

</header>

<div id="produk" class="grid"></div>

<div id="cartPage" class="cartPage">

<h2>Keranjang Belanja</h2>

<div id="cartList"></div>

<div class="total" id="totalHarga"></div>

<br>

<button onclick="checkout()">Checkout WhatsApp</button>

<br><br>

<button onclick="tutupCart()">Kembali</button>

</div>

<a href="https://wa.me/6281220549530" class="wa">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>

let produk=[

{nama:"Baju Fashion",harga:120000,img:"https://images.unsplash.com/photo-1520975922284-8b456906c813",pcs:0},

{nama:"Tas Wanita",harga:150000,img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3",pcs:0},

{nama:"Sepatu Trend",harga:200000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff",pcs:0},

{nama:"Jaket Pria",harga:250000,img:"https://images.unsplash.com/photo-1520974735194-9c7e70c4b6f7",pcs:0}

]

function tampilProduk(){

let html=""

produk.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.nama}</h3>

<p>Rp ${p.harga}</p>

<button onclick="tambah(${i})">Tambah</button>

<p>${p.pcs} pcs</p>

</div>

`

})

document.getElementById("produk").innerHTML=html

updateCart()

}

function tambah(i){

produk[i].pcs++

tampilProduk()

}

function updateCart(){

let total=0

produk.forEach(p=>{

total+=p.pcs

})

document.getElementById("cartCount").innerText=total

}

function bukaCart(){

document.getElementById("produk").style.display="none"
document.getElementById("cartPage").style.display="block"

let html=""
let total=0

produk.forEach(p=>{

if(p.pcs>0){

let harga=p.harga*p.pcs

total+=harga

html+=`

<p>${p.nama} - ${p.pcs} pcs - Rp ${harga}</p>

`

}

})

document.getElementById("cartList").innerHTML=html

document.getElementById("totalHarga").innerText="Total Rp "+total

}

function tutupCart(){

document.getElementById("produk").style.display="grid"
document.getElementById("cartPage").style.display="none"

}

function checkout(){

let pesan="Halo saya ingin pesan:%0A"

let total=0

produk.forEach(p=>{

if(p.pcs>0){

let harga=p.harga*p.pcs

total+=harga

pesan+=p.nama+" "+p.pcs+" pcs - Rp "+harga+"%0A"

}

})

pesan+="Total: Rp "+total

window.open("https://wa.me/6281220549530?text="+pesan)

}

tampilProduk()

</script>

</body>
</html>
