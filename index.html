<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JUANDY BUTIK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* LOGIN */

#loginPage{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(270deg,#ff512f,#ff9966,#ff512f);
background-size:600% 600%;
animation:bg 8s infinite;

}

@keyframes bg{

0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}

}

.box{

background:white;
padding:30px;
border-radius:15px;
width:300px;

}

input{

width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;

}

.password{

position:relative;

}

.password i{

position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;

}

button{

width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#ff512f;
color:white;

}

/* TOKO */

#shop{

display:none;

}

header{

background:#ff512f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;

}

.container{

display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;

}

.card{

background:white;
border-radius:10px;
padding:10px;

}

.card img{

width:100%;
border-radius:10px;
height:140px;
object-fit:cover;

}

.cart{

position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:55px;
height:55px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:22px;

}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="box">

<h2>Login</h2>

<input id="user" placeholder="Username">

<div class="password">

<input id="pass" type="password" placeholder="Password">

<i class="fa fa-eye" onclick="lihat()"></i>

</div>

<button onclick="login()">Login</button>

<button onclick="daftar()">Daftar</button>

</div>

</div>

<!-- TOKO -->

<div id="shop">

<header>

JUANDY BUTIK

<div>

Keranjang <span id="count">0</span>

</div>

</header>

<div class="container">

<div class="card">

<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">

<h3>Baju Fashion</h3>

<p>Rp120000</p>

<button onclick="add('Baju Fashion',120000)">Tambah</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1590874103328-eac38a683ce7">

<h3>Tas Wanita</h3>

<p>Rp150000</p>

<button onclick="add('Tas Wanita',150000)">Tambah</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

<h3>Sepatu Trend</h3>

<p>Rp200000</p>

<button onclick="add('Sepatu Trend',200000)">Tambah</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">

<h3>Jaket Pria</h3>

<p>Rp250000</p>

<button onclick="add('Jaket Pria',250000)">Tambah</button>

</div>

</div>

<div class="cart" onclick="checkout()">

<i class="fa fa-shopping-cart"></i>

</div>

</div>

<script>

/* LOGIN */

function login(){

if(user.value==localStorage.user && pass.value==localStorage.pass){

loginPage.style.display="none"
shop.style.display="block"

}else{

alert("Login gagal")

}

}

function daftar(){

if(pass.value.length<5){

alert("Password minimal 5 digit")
return

}

localStorage.user=user.value
localStorage.pass=pass.value

alert("Akun berhasil dibuat")

}

/* LIHAT PASSWORD */

function lihat(){

if(pass.type=="password"){
pass.type="text"
}else{
pass.type="password"
}

}

/* CART */

let cart={}
let total=0

function add(name,price){

if(!cart[name]){
cart[name]={qty:0}
}

cart[name].qty++

total++

count.innerText=total

}

/* CHECKOUT WA */

function checkout(){

let text="Pesanan JUANDY BUTIK:%0A"

for(let x in cart){

text+=x+" "+cart[x].qty+" pcs%0A"

}

window.open("https://wa.me/6281234567890?text="+text)

}

</script>

</body>
</html>
