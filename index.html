<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JUANDY BUTIK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:#000;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
font-weight:bold;
}

.cart-icon{
cursor:pointer;
}

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#1c1c1c;
border-radius:15px;
overflow:hidden;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.nama{
font-size:16px;
font-weight:bold;
margin-top:10px;
}

.harga{
color:#ccc;
margin-bottom:10px;
}

button{
background:#00c853;
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
cursor:pointer;
margin-bottom:15px;
font-weight:bold;
}

.cart-box{
position:fixed;
top:0;
right:-100%;
width:300px;
height:100%;
background:#111;
padding:20px;
transition:0.4s;
overflow:auto;
}

.cart-box.active{
right:0;
}

.cart-item{
border-bottom:1px solid #333;
padding:10px 0;
}

.total{
margin-top:15px;
font-weight:bold;
}

.checkout{
background:#25D366;
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
font-weight:bold;
}

.wa-float{
position:fixed;
bottom:90px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
color:white;
cursor:pointer;
box-shadow:0 0 10px rgba(0,0,0,0.7);
}

footer{
background:#000;
text-align:center;
padding:20px;
margin-top:40px;
color:#aaa;
font-size:14px;
}

</style>
</head>

<body>

<header>
JUANDY BUTIK
<div class="cart-icon" onclick="toggleCart()">
🛒 <span id="cart-count">0</span>
</div>
</header>

<div class="container" id="produk"></div>

<div class="cart-box" id="cartBox">
<h3>Keranjang</h3>

<div id="cartItems"></div>

<div class="total">
Total: Rp <span id="totalHarga">0</span>
</div>

<button class="checkout" onclick="checkout()">
Checkout WhatsApp
</button>

</div>

<div class="wa-float" onclick="waDirect()">
<i class="fa-brands fa-whatsapp"></i>
</div>

<footer>
© 2026 JUANDY BUTIK
<br>
Belanja mudah langsung WhatsApp
</footer>

<script>

const produk=[

{
nama:"Baju Fashion",
harga:120000,
img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
},

{
nama:"Tas Wanita",
harga:150000,
img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"
},

{
nama:"Sepatu Trend",
harga:200000,
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"
},

{
nama:"Jaket Pria",
harga:250000,
img:"https://images.unsplash.com/photo-1548883354-7622d03aca27"
}

]

let cart=[]

function tampilProduk(){

let html=""

produk.forEach((p,i)=>{

html+=`
<div class="card">
<img src="${p.img}">
<div class="nama">${p.nama}</div>
<div class="harga">Rp ${p.harga}</div>
<button onclick="tambah(${i})">Tambah</button>
</div>
`

})

document.getElementById("produk").innerHTML=html

}

function tambah(i){

cart.push(produk[i])

updateCart()

}

function updateCart(){

let html=""
let total=0

cart.forEach((item,index)=>{

total+=item.harga

html+=`
<div class="cart-item">
${item.nama} - Rp ${item.harga}
<br>
<button onclick="hapus(${index})">Hapus</button>
</div>
`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("totalHarga").innerText=total
document.getElementById("cart-count").innerText=cart.length

}

function hapus(i){

cart.splice(i,1)

updateCart()

}

function toggleCart(){

document.getElementById("cartBox").classList.toggle("active")

}

function checkout(){

if(cart.length==0){

alert("Keranjang kosong")

return

}

let pesan="Halo saya ingin memesan:%0A%0A"

cart.forEach(item=>{

pesan+=item.nama+" - Rp "+item.harga+"%0A"

})

window.open("https://wa.me/6281220549530?text="+pesan)

}

function waDirect(){

window.open("https://wa.me/6281220549530")

}

tampilProduk()

</script>

</body>
</html>
